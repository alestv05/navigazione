<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NavTech | Problema del Vento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(10, 20, 30, 0.6);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.35;
            z-index: -1;
            pointer-events: none;
        }
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
        }
        .logo-text:hover { text-shadow: 0 0 8px var(--accent-cyan); }
        .logo-text span { color: var(--accent-cyan); }
        .logo-text i { margin-right: 8px; color: var(--accent-cyan); }
        .hamburger {
            display: block;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 10px;
        }
        .bar {
            display: block;
            width: 30px;
            height: 3px;
            margin: 6px auto;
            background-color: var(--accent-cyan);
            transition: all 0.3s ease;
            border-radius: 2px;
        }
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 380px;
            height: 100vh;
            background: rgba(2, 5, 10, 0.98);
            backdrop-filter: blur(25px);
            border-left: 2px solid var(--accent-cyan);
            z-index: 1050;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding-top: 100px;
            box-shadow: -10px 0 50px rgba(0, 229, 255, 0.2);
        }
        .mobile-menu.active { right: 0; }
        .menu-header {
            position: absolute;
            top: 25px;
            left: 30px;
            right: 60px;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--accent-cyan);
            padding-bottom: 8px;
            font-size: 1.1rem;
        }
        .menu-header i { margin-right: 8px; }
        .mobile-nav-links {
            list-style: none;
            padding: 0 30px;
        }
        .mobile-nav-links li {
            margin: 0;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.4s ease;
        }
        .mobile-menu.active .mobile-nav-links li {
            opacity: 1;
            transform: translateX(0);
        }
        .mobile-nav-links li:nth-child(1) { transition-delay: 0.1s; }
        .mobile-nav-links li:nth-child(2) { transition-delay: 0.2s; }
        .mobile-nav-links li:nth-child(3) { transition-delay: 0.3s; }
        .mobile-nav-links li:nth-child(4) { transition-delay: 0.4s; }
        .mobile-nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 1.25rem;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        .mobile-nav-links a i {
            width: 35px;
            font-size: 1.4rem;
            color: var(--accent-cyan);
        }
        .mobile-nav-links a:hover {
            color: var(--accent-cyan);
            padding-left: 20px;
            border-bottom-color: var(--accent-cyan);
        }
        .close-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--accent-cyan);
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1060;
        }
        .close-menu:hover { transform: rotate(90deg); color: #fff; }
        .main-container {
            flex: 1;
            padding: 140px 8% 100px;
            min-height: 100vh;
        }
        .module-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .module-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.1);
            border-color: var(--accent-cyan);
        }
        .module-title {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            color: var(--accent-cyan);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .module-title i { font-size: 2rem; }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            width: 100px;
            margin: 1rem 0 1.5rem 0;
        }
        .calculator-form { margin: 20px 0; }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .input-field {
            flex: 1;
            min-width: 150px;
        }
        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-family: 'Orbitron', monospace;
            color: var(--accent-cyan);
            font-size: 0.9rem;
        }
        .input-field input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: 0.2s;
        }
        .input-field input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 8px rgba(0,229,255,0.3);
        }
        button.calcola {
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 1rem;
            color: #02050a;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        button.calcola:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px var(--accent-cyan);
        }
        .results { margin-top: 30px; }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        .result-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(0,229,255,0.2);
            transition: 0.2s;
        }
        .result-card:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 20, 30, 0.7);
        }
        .result-name {
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            color: var(--accent-cyan);
            margin-bottom: 12px;
            border-left: 3px solid var(--accent-cyan);
            padding-left: 12px;
        }
        .detail-formula {
            font-family: monospace;
            background: rgba(0,229,255,0.1);
            padding: 8px;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 0.85rem;
            overflow-x: auto;
        }
        .detail-substitution {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 0.85rem;
            color: #ccc;
        }
        .detail-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            margin-top: 12px;
            text-align: right;
            border-top: 1px dashed rgba(0,229,255,0.3);
            padding-top: 10px;
        }
        .error-message {
            background: rgba(255,0,0,0.2);
            border-left: 4px solid #ff4444;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            color: #ff8888;
        }
        .iteration-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,229,255,0.2);
        }
        .iteration-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            margin-bottom: 15px;
            border-left: 3px solid var(--accent-cyan);
            padding-left: 12px;
        }
        .iteration-detail {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }
        .detail-item {
            flex: 1;
            min-width: 200px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
        }
        .final-results {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .final-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(0,229,255,0.2);
        }
        .footer-credits {
            width: 100%;
            padding: 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(10px);
            margin-top: auto;
        }
        .footer-credits p { color: #888; font-size: 0.8rem; letter-spacing: 1px; }
        .footer-credits .developers {
            margin-top: 5px;
            font-size: 0.9rem;
            color: var(--accent-cyan);
            font-family: 'Orbitron', sans-serif;
        }
        .footer-credits .developers i { margin: 0 8px; color: #fff; }
        .footer-credits .developers span { color: #fff; font-weight: 300; }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1040;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        @media (max-width: 768px) {
            .mobile-menu { width: 100%; }
            .main-container { padding: 120px 5% 80px; }
            .module-title { font-size: 1.5rem; }
            .input-group { flex-direction: column; gap: 12px; }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 4px; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>
    <nav>
        <div class="logo-text" id="logo-home"><i class="fas fa-compass-drafting"></i> NAV<span>TECH</span></div>
        <div class="hamburger" id="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
    </nav>
    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="mobile-menu" id="mobile-menu">
        <div class="menu-header"><i class="fas fa-wind"></i> PROBLEMI DEL VENTO</div>
        <button class="close-menu" id="close-menu"><i class="fas fa-times"></i></button>
        <ul class="mobile-nav-links">
            <li><a href="#" data-problem="1"><i class="fas fa-1"></i> Primo Problema</a></li>
            <li><a href="#" data-problem="2"><i class="fas fa-2"></i> Secondo Problema</a></li>
            <li><a href="#" data-problem="3"><i class="fas fa-3"></i> Terzo Problema</a></li>
            <li><a href="#" data-problem="4"><i class="fas fa-4"></i> Quarto Problema</a></li>
        </ul>
    </div>
    <main class="main-container" id="main-container"></main>
    <footer class="footer-credits">
        <p>Sistema di Navigazione Avanzata</p>
        <div class="developers"><span>Sviluppato da</span><i class="fas fa-code"></i><strong>Alessio Lucchini</strong><i class="fas fa-plus"></i><strong>Andrea Squizzato</strong></div>
    </footer>
    <script>
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const closeMenuBtn = document.getElementById('close-menu');
        let currentProblem = 1;

        function setHamburgerOpen() {
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(-45deg) translate(-6px, 7px)';
            bars[1].style.opacity = '0';
            bars[2].style.transform = 'rotate(45deg) translate(-6px, -7px)';
        }
        function setHamburgerClosed() {
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(0) translate(0, 0)';
            bars[1].style.opacity = '1';
            bars[2].style.transform = 'rotate(0) translate(0, 0)';
        }
        function openMenu() {
            mobileMenu.classList.add('active');
            menuOverlay.classList.add('active');
            setHamburgerOpen();
        }
        function closeMenu() {
            mobileMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
            setHamburgerClosed();
        }
        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (mobileMenu.classList.contains('active')) closeMenu();
            else openMenu();
        });
        closeMenuBtn.addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu);

        function showProblem1() {
            const container = document.getElementById('main-container');
            container.innerHTML = `
                <div class="module-card">
                    <div class="module-title"><i class="fas fa-1"></i> Primo Problema del Vento</div>
                    <div class="divider"></div>
                    <div class="calculator-form">
                        <div class="input-group">
                            <div class="input-field"><label>TC (Rotta Vera) <i class="fas fa-arrow-right"></i></label><input type="number" id="tc" step="any" placeholder="Inserisci TC in gradi"></div>
                            <div class="input-field"><label>TAS (Velocità propria) <i class="fas fa-gauge-high"></i></label><input type="number" id="tas" step="any" placeholder="Inserisci TAS in nodi"></div>
                            <div class="input-field"><label>W (Direzione del vento) <i class="fas fa-wind"></i></label><input type="number" id="w" step="any" placeholder="Inserisci W in gradi"></div>
                            <div class="input-field"><label>V (Velocità del vento) <i class="fas fa-gauge-high"></i></label><input type="number" id="v" step="any" placeholder="Inserisci V in nodi"></div>
                        </div>
                        <button class="calcola" id="calcola">CALCOLA</button>
                        <div id="risultati"></div>
                    </div>
                </div>
            `;
            document.getElementById('calcola').addEventListener('click', () => {
                const tc = parseFloat(document.getElementById('tc').value);
                const tas = parseFloat(document.getElementById('tas').value);
                const w = parseFloat(document.getElementById('w').value);
                const v = parseFloat(document.getElementById('v').value);
                if (isNaN(tc) || isNaN(tas) || isNaN(w) || isNaN(v)) {
                    document.getElementById('risultati').innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori numerici.</div>`;
                    return;
                }
                const diff_deg = w - tc;
                const diff_rad = diff_deg * Math.PI / 180;
                const xc = v * Math.sin(diff_rad);
                const lc = -v * Math.cos(diff_rad);
                const rapporto = xc / tas;
                if (Math.abs(rapporto) > 1) {
                    document.getElementById('risultati').innerHTML = `<div class="error-message">⚠️ VENTO TROPPO FORTE! Il rapporto xc/TAS supera 1.</div>`;
                    return;
                }
                const wca_rad = Math.asin(rapporto);
                const wca = wca_rad * 180 / Math.PI;
                const etas = tas * Math.cos(wca_rad);
                let th = tc + wca;
                th = ((th % 360) + 360) % 360;
                const gs = etas + lc;
                const round3 = (n) => n.toFixed(3);
                document.getElementById('risultati').innerHTML = `
                    <div class="results"><div class="results-grid">
                        <div class="result-card"><div class="result-name">XC</div><div class="detail-formula">XC = V · sin(W - TC)</div><div class="detail-substitution">XC = ${v} · sin(${w} - ${tc}) = ${v} · sin(${diff_deg}°)</div><div class="detail-substitution">sin(${diff_deg}°) = ${Math.sin(diff_rad).toFixed(6)}</div><div class="detail-value">${round3(xc)}</div></div>
                        <div class="result-card"><div class="result-name">LC</div><div class="detail-formula">LC = -V · cos(W - TC)</div><div class="detail-substitution">LC = -${v} · cos(${w} - ${tc}) = -${v} · cos(${diff_deg}°)</div><div class="detail-substitution">cos(${diff_deg}°) = ${Math.cos(diff_rad).toFixed(6)}</div><div class="detail-value">${round3(lc)}</div></div>
                        <div class="result-card"><div class="result-name">WCA</div><div class="detail-formula">WCA = arcsin(XC / TAS)</div><div class="detail-substitution">WCA = arcsin(${round3(xc)} / ${tas}) = arcsin(${rapporto.toFixed(6)})</div><div class="detail-value">${round3(wca)}°</div></div>
                        <div class="result-card"><div class="result-name">ETAS</div><div class="detail-formula">ETAS = TAS · cos(WCA)</div><div class="detail-substitution">ETAS = ${tas} · cos(${round3(wca)}°) = ${tas} · ${Math.cos(wca_rad).toFixed(6)}</div><div class="detail-value">${round3(etas)}</div></div>
                        <div class="result-card"><div class="result-name">TH</div><div class="detail-formula">TH = TC + WCA</div><div class="detail-substitution">TH = ${tc} + ${round3(wca)} = ${round3(th)}</div><div class="detail-value">${round3(th)}°</div></div>
                        <div class="result-card"><div class="result-name">GS</div><div class="detail-formula">GS = ETAS + LC</div><div class="detail-substitution">GS = ${round3(etas)} + (${round3(lc)}) = ${round3(gs)}</div><div class="detail-value">${round3(gs)}</div></div>
                    </div></div>
                `;
            });
        }

        function showProblem2() {
            const container = document.getElementById('main-container');
            container.innerHTML = `
                <div class="module-card">
                    <div class="module-title"><i class="fas fa-2"></i> Secondo Problema del Vento</div>
                    <div class="divider"></div>
                    <div class="calculator-form">
                        <div class="input-group">
                            <div class="input-field"><label>TH (Rotta vera) <i class="fas fa-arrow-right"></i></label><input type="number" id="th" step="any" placeholder="Inserisci TH in gradi"></div>
                            <div class="input-field"><label>TAS (Velocità propria) <i class="fas fa-gauge-high"></i></label><input type="number" id="tas" step="any" placeholder="Inserisci TAS in nodi"></div>
                            <div class="input-field"><label>W (Direzione del vento) <i class="fas fa-wind"></i></label><input type="number" id="w" step="any" placeholder="Inserisci W in gradi"></div>
                            <div class="input-field"><label>V (Velocità del vento) <i class="fas fa-gauge-high"></i></label><input type="number" id="v" step="any" placeholder="Inserisci V in nodi"></div>
                        </div>
                        <button class="calcola" id="calcola">CALCOLA</button>
                        <div id="risultati"></div>
                    </div>
                </div>
            `;
            document.getElementById('calcola').addEventListener('click', () => {
                const th = parseFloat(document.getElementById('th').value);
                const tas = parseFloat(document.getElementById('tas').value);
                const wd = parseFloat(document.getElementById('w').value);
                const wv = parseFloat(document.getElementById('v').value);
                if (isNaN(th) || isNaN(tas) || isNaN(wd) || isNaN(wv)) {
                    document.getElementById('risultati').innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori numerici.</div>`;
                    return;
                }
                const round3 = (n) => n.toFixed(3);
                let tcp_prev = th;
                let iterationsHtml = '';
                let finalTcp = tcp_prev;
                let finalWca = 0;
                for (let i = 1; i <= 5; i++) {
                    const alfa_deg = wd - tcp_prev;
                    const alfa_rad = alfa_deg * Math.PI / 180;
                    const xc = wv * Math.sin(alfa_rad);
                    let ratio = xc / tas;
                    if (ratio > 1) ratio = 1;
                    if (ratio < -1) ratio = -1;
                    const wca_rad = Math.asin(ratio);
                    const wca = wca_rad * 180 / Math.PI;
                    const tcp_curr = th - wca;
                    const diff = Math.abs(tcp_curr - tcp_prev);
                    finalTcp = tcp_curr;
                    finalWca = wca;
                    iterationsHtml += `<div class="iteration-card"><div class="iteration-title">Iterazione ${i}</div><div class="iteration-detail">
                        <div class="detail-item"><div class="detail-name">XC</div><div class="detail-formula">XC = V · sin(W - TCp)</div><div class="detail-substitution">XC = ${wv} · sin(${wd} - ${round3(tcp_prev)}) = ${wv} · sin(${alfa_deg.toFixed(3)}°)</div><div class="detail-value">${round3(xc)}</div></div>
                        <div class="detail-item"><div class="detail-name">WCA</div><div class="detail-formula">WCA = arcsin(XC / TAS)</div><div class="detail-substitution">WCA = arcsin(${round3(xc)} / ${tas}) = arcsin(${ratio.toFixed(6)})</div><div class="detail-value">${round3(wca)}°</div></div>
                        <div class="detail-item"><div class="detail-name">TCp</div><div class="detail-formula">TCp = TH - WCA</div><div class="detail-substitution">TCp = ${th} - ${round3(wca)} = ${round3(tcp_curr)}</div><div class="detail-value">${round3(tcp_curr)}°</div></div>
                    </div></div>`;
                    if (diff < 0.001) break;
                    tcp_prev = tcp_curr;
                }
                const ang_lc_rad = (wd - finalTcp) * Math.PI / 180;
                const lc = -wv * Math.cos(ang_lc_rad);
                const etas = tas * Math.cos(finalWca * Math.PI / 180);
                const gs = etas + lc;
                document.getElementById('risultati').innerHTML = `<div class="results"><h3 style="color:var(--accent-cyan); margin-bottom:15px;">Iterazioni</h3>${iterationsHtml}<h3 style="color:var(--accent-cyan); margin:30px 0 15px 0;">Risultati finali</h3>
                <div class="final-results">
                    <div class="final-card"><div class="result-name">LC</div><div class="detail-formula">LC = -V · cos(W - TCp)</div><div class="detail-substitution">LC = -${wv} · cos(${wd} - ${round3(finalTcp)})</div><div class="detail-value">${round3(lc)}</div></div>
                    <div class="final-card"><div class="result-name">ETAS</div><div class="detail-formula">ETAS = TAS · cos(WCA)</div><div class="detail-substitution">ETAS = ${tas} · cos(${round3(finalWca)}°)</div><div class="detail-value">${round3(etas)}</div></div>
                    <div class="final-card"><div class="result-name">GS</div><div class="detail-formula">GS = ETAS + LC</div><div class="detail-substitution">GS = ${round3(etas)} + (${round3(lc)})</div><div class="detail-value">${round3(gs)}</div></div>
                </div></div>`;
            });
        }

        function showProblem3() {
            const container = document.getElementById('main-container');
            container.innerHTML = `
                <div class="module-card">
                    <div class="module-title"><i class="fas fa-3"></i> Terzo Problema del Vento</div>
                    <div class="divider"></div>
                    <div class="calculator-form">
                        <div class="input-group">
                            <div class="input-field"><label>TH (Rotta vera) <i class="fas fa-arrow-right"></i></label><input type="number" id="th" step="any" placeholder="Inserisci TH in gradi"></div>
                            <div class="input-field"><label>TC (Traccia) <i class="fas fa-map"></i></label><input type="number" id="tc" step="any" placeholder="Inserisci TC in gradi"></div>
                            <div class="input-field"><label>GS (Velocità al suolo) <i class="fas fa-gauge-high"></i></label><input type="number" id="gs" step="any" placeholder="Inserisci GS in nodi"></div>
                            <div class="input-field"><label>TAS (Velocità propria) <i class="fas fa-gauge-high"></i></label><input type="number" id="tas" step="any" placeholder="Inserisci TAS in nodi"></div>
                        </div>
                        <button class="calcola" id="calcola">CALCOLA</button>
                        <div id="risultati"></div>
                    </div>
                </div>
            `;
            document.getElementById('calcola').addEventListener('click', () => {
                const th = parseFloat(document.getElementById('th').value);
                const tc = parseFloat(document.getElementById('tc').value);
                const gs = parseFloat(document.getElementById('gs').value);
                const tas = parseFloat(document.getElementById('tas').value);
                if (isNaN(th) || isNaN(tc) || isNaN(gs) || isNaN(tas)) {
                    document.getElementById('risultati').innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori numerici.</div>`;
                    return;
                }
                const wca = th - tc;
                const wca_rad = wca * Math.PI / 180;
                const xc = tas * Math.sin(wca_rad);
                const etas = tas * Math.cos(wca_rad);
                const lc = gs - etas;
                const v = Math.sqrt(xc * xc + lc * lc);
                let w;
                if (Math.abs(v) < 1e-6) w = 0;
                else {
                    const segno = xc > 0 ? -1 : 1;
                    const angolo_interno = 90 - (Math.asin(lc / v) * 180 / Math.PI);
                    let w_parziale = tc + (segno * angolo_interno);
                    w = w_parziale < 180 ? w_parziale + 180 : w_parziale - 180;
                    w = ((w % 360) + 360) % 360;
                }
                const round3 = (n) => n.toFixed(3);
                document.getElementById('risultati').innerHTML = `<div class="results"><div class="results-grid">
                    <div class="result-card"><div class="result-name">WCA</div><div class="detail-formula">WCA = TH - TC</div><div class="detail-substitution">WCA = ${th} - ${tc} = ${wca}</div><div class="detail-value">${round3(wca)}°</div></div>
                    <div class="result-card"><div class="result-name">XC</div><div class="detail-formula">XC = TAS · sin(WCA)</div><div class="detail-substitution">XC = ${tas} · sin(${round3(wca)}°) = ${tas} · ${Math.sin(wca_rad).toFixed(6)}</div><div class="detail-value">${round3(xc)}</div></div>
                    <div class="result-card"><div class="result-name">ETAS</div><div class="detail-formula">ETAS = TAS · cos(WCA)</div><div class="detail-substitution">ETAS = ${tas} · cos(${round3(wca)}°) = ${tas} · ${Math.cos(wca_rad).toFixed(6)}</div><div class="detail-value">${round3(etas)}</div></div>
                    <div class="result-card"><div class="result-name">LC</div><div class="detail-formula">LC = GS - ETAS</div><div class="detail-substitution">LC = ${gs} - ${round3(etas)} = ${round3(lc)}</div><div class="detail-value">${round3(lc)}</div></div>
                    <div class="result-card"><div class="result-name">V (vento)</div><div class="detail-formula">V = √(XC² + LC²)</div><div class="detail-substitution">V = √(${round3(xc)}² + ${round3(lc)}²)</div><div class="detail-value">${round3(v)}</div></div>
                    <div class="result-card"><div class="result-name">W (direzione vento)</div><div class="detail-value">${round3(w)}°</div></div>
                </div></div>`;
            });
        }

        function showProblem4() {
            const container = document.getElementById('main-container');
            container.innerHTML = `
                <div class="module-card">
                    <div class="module-title"><i class="fas fa-4"></i> Quarto Problema del Vento</div>
                    <div class="divider"></div>
                    <div class="calculator-form">
                        <div class="input-group">
                            <div class="input-field"><label>TC (Traccia) <i class="fas fa-map"></i></label><input type="number" id="tc" step="any" placeholder="Inserisci TC in gradi"></div>
                            <div class="input-field"><label>GS (Velocità al suolo) <i class="fas fa-gauge-high"></i></label><input type="number" id="gs" step="any" placeholder="Inserisci GS in nodi"></div>
                            <div class="input-field"><label>W (Direzione del vento) <i class="fas fa-wind"></i></label><input type="number" id="w" step="any" placeholder="Inserisci W in gradi"></div>
                            <div class="input-field"><label>V (Velocità del vento) <i class="fas fa-gauge-high"></i></label><input type="number" id="v" step="any" placeholder="Inserisci V in nodi"></div>
                        </div>
                        <button class="calcola" id="calcola">CALCOLA</button>
                        <div id="risultati"></div>
                    </div>
                </div>
            `;
            document.getElementById('calcola').addEventListener('click', () => {
                const tc = parseFloat(document.getElementById('tc').value);
                const gs = parseFloat(document.getElementById('gs').value);
                const w = parseFloat(document.getElementById('w').value);
                const v = parseFloat(document.getElementById('v').value);
                if (isNaN(tc) || isNaN(gs) || isNaN(w) || isNaN(v)) {
                    document.getElementById('risultati').innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori numerici.</div>`;
                    return;
                }
                const diff_deg = w - tc;
                const diff_rad = diff_deg * Math.PI / 180;
                const xc = v * Math.sin(diff_rad);
                const lc = -v * Math.cos(diff_rad);
                const etas = gs - lc;
                if (Math.abs(etas) < 1e-6) {
                    document.getElementById('risultati').innerHTML = `<div class="error-message">⚠️ Errore: ETAS prossimo a zero.</div>`;
                    return;
                }
                const wca_rad = Math.atan(xc / etas);
                const wca = wca_rad * 180 / Math.PI;
                let th = tc + wca;
                th = ((th % 360) + 360) % 360;
                const tas = etas / Math.cos(wca_rad);
                const round3 = (n) => n.toFixed(3);
                document.getElementById('risultati').innerHTML = `<div class="results"><div class="results-grid">
                    <div class="result-card"><div class="result-name">XC</div><div class="detail-formula">XC = V · sin(W - TC)</div><div class="detail-substitution">XC = ${v} · sin(${w} - ${tc})</div><div class="detail-value">${round3(xc)}</div></div>
                    <div class="result-card"><div class="result-name">LC</div><div class="detail-formula">LC = -V · cos(W - TC)</div><div class="detail-substitution">LC = -${v} · cos(${w} - ${tc})</div><div class="detail-value">${round3(lc)}</div></div>
                    <div class="result-card"><div class="result-name">ETAS</div><div class="detail-formula">ETAS = GS - LC</div><div class="detail-substitution">ETAS = ${gs} - (${round3(lc)}) = ${round3(etas)}</div><div class="detail-value">${round3(etas)}</div></div>
                    <div class="result-card"><div class="result-name">WCA</div><div class="detail-formula">WCA = arctan(XC / ETAS)</div><div class="detail-substitution">WCA = arctan(${round3(xc)} / ${round3(etas)})</div><div class="detail-value">${round3(wca)}°</div></div>
                    <div class="result-card"><div class="result-name">TH</div><div class="detail-formula">TH = TC + WCA</div><div class="detail-substitution">TH = ${tc} + ${round3(wca)} = ${round3(th)}</div><div class="detail-value">${round3(th)}°</div></div>
                    <div class="result-card"><div class="result-name">TAS</div><div class="detail-formula">TAS = ETAS / cos(WCA)</div><div class="detail-substitution">TAS = ${round3(etas)} / cos(${round3(wca)}°)</div><div class="detail-value">${round3(tas)}</div></div>
                </div></div>`;
            });
        }

        document.querySelectorAll('.mobile-nav-links a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const problem = link.getAttribute('data-problem');
                if (problem === '1') showProblem1();
                else if (problem === '2') showProblem2();
                else if (problem === '3') showProblem3();
                else if (problem === '4') showProblem4();
                closeMenu();
            });
        });

        document.getElementById('logo-home').addEventListener('click', () => window.location.href = 'Home.html');
        showProblem1();

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.6, vy: (Math.random() - 0.5) * 0.6, size: Math.random() * 2 + 0.5, alpha: Math.random() * 0.5 + 0.2 });
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.x += p.vx; p.y += p.vy; if (p.x < 0 || p.x > canvas.width) p.vx *= -1; if (p.y < 0 || p.y > canvas.height) p.vy *= -1; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(0, 229, 255, ${p.alpha})`; ctx.fill(); });
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', initParticles);
        initParticles();
        drawParticles();
    </script>
</body>
</html>
