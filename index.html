<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav Dashboard Pro - Navigazione Avanzata</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.35;
            z-index: -1;
            pointer-events: none;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .logo-text span {
            color: var(--accent-cyan);
        }

        .logo-text i {
            margin-right: 8px;
            color: var(--accent-cyan);
        }

        .hamburger {
            display: block;
            cursor: pointer;
            z-index: 1100;
            background: transparent;
            border: none;
            padding: 10px;
        }

        .bar {
            display: block;
            width: 30px;
            height: 3px;
            margin: 6px auto;
            background-color: var(--accent-cyan);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .nav-links {
            display: none !important;
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 380px;
            height: 100vh;
            background: rgba(2, 5, 10, 0.98);
            backdrop-filter: blur(25px);
            border-left: 2px solid var(--accent-cyan);
            z-index: 1050;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding-top: 100px;
            box-shadow: -10px 0 50px rgba(0, 229, 255, 0.2);
        }

        .mobile-menu.active {
            right: 0;
        }

        .menu-header {
            position: absolute;
            top: 25px;
            left: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--accent-cyan);
            padding-bottom: 8px;
        }

        .menu-header i {
            margin-right: 8px;
        }

        .mobile-nav-links {
            list-style: none;
            padding: 0 30px;
        }

        .mobile-nav-links li {
            margin: 0;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.4s ease;
        }

        .mobile-menu.active .mobile-nav-links li {
            opacity: 1;
            transform: translateX(0);
        }

        .mobile-menu.active .mobile-nav-links li:nth-child(1) { transition-delay: 0.1s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(2) { transition-delay: 0.2s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(3) { transition-delay: 0.3s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(4) { transition-delay: 0.4s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(5) { transition-delay: 0.5s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(6) { transition-delay: 0.6s; }

        .mobile-nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 1.25rem;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .mobile-nav-links a i {
            width: 35px;
            font-size: 1.4rem;
            color: var(--accent-cyan);
        }

        .mobile-nav-links a:hover {
            color: var(--accent-cyan);
            padding-left: 20px;
            border-bottom-color: var(--accent-cyan);
        }

        .close-menu {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            border: none;
            color: var(--accent-cyan);
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-menu:hover {
            transform: rotate(90deg);
            color: #fff;
        }

        .main-container {
            flex: 1;
            padding: 140px 8% 100px; /* padding-bottom per evitare sovrapposizione con footer fisso */
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
        }

        .hero-header {
            text-align: center;
        }

        .hero-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-header h1 span {
            color: var(--accent-cyan);
            font-size: 1rem;
            background: none;
            -webkit-text-fill-color: var(--accent-cyan);
        }

        .hero-header p {
            color: #aaa;
            font-size: 1rem;
        }

        .footer-credits {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(10px);
            z-index: 900;
        }

        .footer-credits p {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .footer-credits .developers {
            margin-top: 5px;
            font-size: 0.9rem;
            color: var(--accent-cyan);
            font-family: 'Orbitron', sans-serif;
        }

        .footer-credits .developers i {
            margin: 0 8px;
            color: #fff;
            font-size: 0.8rem;
        }

        .footer-credits .developers span {
            color: #fff;
            font-weight: 300;
        }

        @media (max-width: 768px) {
            .mobile-menu {
                width: 100%;
            }
            .main-container {
                padding: 120px 5% 80px;
            }
            .footer-credits .developers {
                font-size: 0.7rem;
                display: flex;
                flex-direction: column;
                gap: 5px;
            }
            .footer-credits .developers i {
                display: none;
            }
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-cyan);
            border-radius: 4px;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1040;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>

    <nav id="navbar">
        <div class="logo-text">
            <i class="fas fa-compass-drafting"></i> NAV<span>TECH</span>
        </div>
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>

    <div class="mobile-menu" id="mobile-menu">
        <div class="menu-header">
            <i class="fas fa-compass"></i> NAVIGAZIONE
        </div>
        <button class="close-menu" id="close-menu">
            <i class="fas fa-times"></i>
        </button>
        <ul class="mobile-nav-links">
            <li><a href="#" data-page="vento"><i class="fas fa-wind"></i> Problema del Vento</a></li>
            <li><a href="#" data-page="lossodromia"><i class="fas fa-route"></i> Lossodromia</a></li>
            <li><a href="#" data-page="ortodromia"><i class="fas fa-earth-americas"></i> Ortodromia</a></li>
            <li><a href="#" data-page="pnr"><i class="fas fa-map-location-dot"></i> PNR</a></li>
            <!-- Sostituito PER con PET come richiesto -->
            <li><a href="#" data-page="per"><i class="fas fa-clock-rotate-left"></i> PET</a></li>
            <li><a href="#" data-page="intercettamento"><i class="fas fa-crosshairs"></i> Intercettamento</a></li>
        </ul>
    </div>

    <main class="main-container">
        <div class="hero-header reveal">
            <h1>Flight Computer <span>v3.5</span></h1>
            <p>Sistema integrato per il calcolo delle rotte e parametri di navigazione</p>
        </div>
    </main>

    <footer class="footer-credits reveal">
        <p>Sistema di Navigazione Avanzata</p>
        <div class="developers">
            <span>Sviluppato da</span>
            <i class="fas fa-code"></i>
            <strong>Alessio Lucchini</strong>
            <i class="fas fa-plus"></i>
            <strong>Andrea Squizzato</strong>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const closeMenuBtn = document.getElementById('close-menu');

        function openMenu() {
            mobileMenu.classList.add('active');
            menuOverlay.classList.add('active');
            hamburger.classList.add('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(-45deg) translate(-6px, 7px)';
            bars[1].style.opacity = '0';
            bars[2].style.transform = 'rotate(45deg) translate(-6px, -7px)';
        }

        function closeMenu() {
            mobileMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
            hamburger.classList.remove('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(0) translate(0, 0)';
            bars[1].style.opacity = '1';
            bars[2].style.transform = 'rotate(0) translate(0, 0)';
        }

        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (mobileMenu.classList.contains('active')) closeMenu();
            else openMenu();
        });

        closeMenuBtn.addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu);

        // Modifica: il titolo del modulo PER diventa PET per coerenza con la voce di menu
        const pageTitles = {
            vento: 'Problema del Vento',
            lossodromia: 'Lossodromia',
            ortodromia: 'Ortodromia',
            pnr: 'PNR',
            per: 'PET',          // Sostituito PER con PET
            intercettamento: 'Intercettamento'
        };

        const pageIcons = {
            vento: 'wind',
            lossodromia: 'route',
            ortodromia: 'earth-americas',
            pnr: 'map-location-dot',
            per: 'clock-rotate-left',
            intercettamento: 'crosshairs'
        };

        function openModule(pageKey) {
            const pageName = pageTitles[pageKey];
            const icon = pageIcons[pageKey];
            const newWindow = window.open('about:blank', '_blank');
            if (newWindow) {
                newWindow.document.title = pageName + ' - NavTech';
                newWindow.document.body.style.backgroundColor = '#02050a';
                newWindow.document.body.style.color = '#fff';
                newWindow.document.body.style.fontFamily = 'Poppins, sans-serif';
                newWindow.document.body.style.margin = '0';
                newWindow.document.body.innerHTML = `
                    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; background: linear-gradient(135deg, #02050a 0%, #0a1420 100%);">
                        <i class="fas fa-${icon}" style="font-size: 5rem; color: #00e5ff; margin-bottom: 30px; filter: drop-shadow(0 0 20px rgba(0,229,255,0.5));"></i>
                        <h1 style="font-family: Orbitron; color: #00e5ff; font-size: 2.5rem; margin-bottom: 20px;">${pageName}</h1>
                        <div style="width: 100px; height: 2px; background: linear-gradient(90deg, transparent, #00e5ff, transparent); margin-bottom: 30px;"></div>
                        <p style="font-size: 1.1rem; color: #aaa;">Modulo in fase di sviluppo</p>
                        <p style="margin-top: 40px; font-size: 0.8rem; color: #00e5ff;">Sviluppato da Alessio Lucchini & Andrea Squizzato</p>
                        <button onclick="window.close()" style="margin-top: 40px; background: transparent; border: 1px solid #00e5ff; color: #00e5ff; padding: 12px 30px; border-radius: 4px; cursor: pointer; font-family: Poppins; transition: 0.3s;">Chiudi</button>
                    </div>
                `;
                const linkFA = newWindow.document.createElement('link');
                linkFA.rel = 'stylesheet';
                linkFA.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';
                newWindow.document.head.appendChild(linkFA);
            }
        }

        document.querySelectorAll('.mobile-nav-links a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const pageKey = link.getAttribute('data-page');
                openModule(pageKey);
                closeMenu();
            });
        });

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.5 + 0.2
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 229, 255, ${p.alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', initParticles);
        initParticles();
        drawParticles();

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => entry.isIntersecting && entry.target.classList.add('active'));
        }, { threshold: 0.15 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        if (typeof VanillaTilt !== 'undefined') {
            VanillaTilt.init(document.querySelectorAll("[data-tilt]"), {
                max: 12, speed: 400, glare: true, "max-glare": 0.2, scale: 1.02
            });
        }
    </script>
</body>
</html>
