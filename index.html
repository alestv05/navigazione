<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NavTech - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(10, 20, 30, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Sfondo e Particelle */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
        }
        .logo-text:hover { text-shadow: 0 0 8px var(--accent-cyan); }
        .logo-text span { color: var(--accent-cyan); }
        .logo-text i { margin-right: 8px; color: var(--accent-cyan); }

        /* Hamburger Menu UI */
        .hamburger {
            display: block;
            cursor: pointer;
            z-index: 1100;
            background: transparent;
            border: none;
            padding: 10px;
        }

        .bar {
            display: block;
            width: 30px;
            height: 3px;
            margin: 6px auto;
            background-color: var(--accent-cyan);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        /* Menu Laterale (Uguale per tutti) */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 380px;
            height: 100vh;
            background: rgba(2, 5, 10, 0.98);
            backdrop-filter: blur(25px);
            border-left: 2px solid var(--accent-cyan);
            z-index: 1050;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding-top: 100px;
            box-shadow: -10px 0 50px rgba(0, 229, 255, 0.2);
        }

        .mobile-menu.active { right: 0; }

        .menu-header {
            position: absolute;
            top: 25px;
            left: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--accent-cyan);
            padding-bottom: 8px;
        }

        .mobile-nav-links {
            list-style: none;
            padding: 0 30px;
        }

        .mobile-nav-links li {
            margin: 0;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.4s ease;
        }

        .mobile-menu.active .mobile-nav-links li {
            opacity: 1;
            transform: translateX(0);
        }

        .mobile-nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .mobile-nav-links a i {
            width: 30px;
            color: var(--accent-cyan);
        }

        .mobile-nav-links a:hover {
            color: var(--accent-cyan);
            padding-left: 15px;
        }

        .close-menu {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            border: none;
            color: var(--accent-cyan);
            font-size: 1.8rem;
            cursor: pointer;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1040;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .menu-overlay.active { opacity: 1; visibility: visible; }

        /* Main Container */
        .main-container {
            flex: 1;
            padding: 140px 8% 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .module-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid var(--border);
            padding: 4rem 2rem;
            width: 100%;
            max-width: 900px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .module-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--accent-cyan);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            width: 60%;
            margin: 2rem auto;
        }

        /* Footer */
        .footer-credits {
            width: 100%;
            padding: 30px;
            text-align: center;
            border-top: 1px solid var(--border);
            background: rgba(2, 5, 10, 0.9);
            margin-top: auto;
        }
        .footer-credits p { color: #666; font-size: 0.8rem; margin-bottom: 10px; }
        .developers { font-family: 'Orbitron', sans-serif; color: var(--accent-cyan); font-size: 0.9rem; }
        .developers strong { color: #fff; margin: 0 5px; }

        @media (max-width: 768px) {
            .mobile-menu { width: 100%; }
            .module-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>

    <nav>
        <div class="logo-text" id="logo-home">
            <i class="fas fa-compass-drafting"></i> NAV<span>TECH</span>
        </div>
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>

    <div class="mobile-menu" id="mobile-menu">
        <div class="menu-header" id="menu-title-header">NAVIGAZIONE</div>
        <button class="close-menu" id="close-menu"><i class="fas fa-times"></i></button>
        <ul class="mobile-nav-links" id="nav-links-container">
            </ul>
    </div>

    <main class="main-container" id="main-container">
        </main>

    <footer class="footer-credits">
        <p>SISTEMA DI NAVIGAZIONE PROFESSIONALE</p>
        <div class="developers">
            SVILUPPATO DA <strong>ALESSIO LUCCHINI</strong> <i class="fas fa-code"></i> <strong>ANDREA SQUIZZATO</strong>
        </div>
    </footer>

    <script>
        // Configurazione Menu
        const menuConfig = {
            main: [
                { id: 'vento', label: 'Problema del Vento', icon: 'fa-wind' },
                { id: 'lossodromia', label: 'Lossodromia', icon: 'fa-route' },
                { id: 'ortodromia', label: 'Ortodromia', icon: 'fa-earth-americas' },
                { id: 'pnr', label: 'PNR', icon: 'fa-map-location-dot' },
                { id: 'per', label: 'PET', icon: 'fa-clock-rotate-left' },
                { id: 'intercettamento', label: 'Intercettamento', icon: 'fa-crosshairs' }
            ],
            vento: [
                { id: 'v1', label: '1° Problema', icon: 'fa-1' },
                { id: 'v2', label: '2° Problema', icon: 'fa-2' },
                { id: 'v3', label: '3° Problema', icon: 'fa-3' },
                { id: 'v4', label: '4° Problema', icon: 'fa-4' }
            ]
        };

        let currentContext = 'main';

        // Elementi DOM
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const navLinksContainer = document.getElementById('nav-links-container');
        const menuTitleHeader = document.getElementById('menu-title-header');
        const mainContainer = document.getElementById('main-container');

        // Funzione per popolare il menu
        function updateMenuContent(context) {
            currentContext = context;
            navLinksContainer.innerHTML = '';
            
            const links = menuConfig[context] || menuConfig.main;
            menuTitleHeader.innerText = context === 'vento' ? 'VENTO' : 'NAVIGAZIONE';

            links.forEach((link, index) => {
                const li = document.createElement('li');
                li.style.transitionDelay = `${0.1 * (index + 1)}s`;
                li.innerHTML = `<a href="#" data-id="${link.id}"><i class="fas ${link.icon}"></i> ${link.label}</a>`;
                
                li.querySelector('a').addEventListener('click', (e) => {
                    e.preventDefault();
                    if (context === 'main' && link.id === 'vento') {
                        navigateTo('vento');
                        updateMenuContent('vento');
                    } else if (context === 'vento') {
                        // Selezionato un problema specifico del vento
                        showModule(link.label);
                    } else {
                        navigateTo(link.id);
                    }
                    closeMenu();
                });
                navLinksContainer.appendChild(li);
            });
        }

        // Navigazione tra sezioni (Solo Titoli)
        function navigateTo(id) {
            if (id === 'home') {
                mainContainer.innerHTML = '';
                updateMenuContent('main');
                document.title = "NavTech - Home";
            } else {
                const labels = {
                    vento: 'Problema del Vento',
                    lossodromia: 'Lossodromia',
                    ortodromia: 'Ortodromia',
                    pnr: 'PNR',
                    per: 'PET',
                    intercettamento: 'Intercettamento'
                };
                showModule(labels[id]);
                if (id === 'vento') updateMenuContent('vento');
            }
        }

        function showModule(title) {
            mainContainer.innerHTML = `
                <div class="module-card">
                    <h1 class="module-title">${title}</h1>
                    <div class="divider"></div>
                </div>
            `;
            document.title = `NavTech - ${title}`;
        }

        // Gestione Menu Toggle
        function openMenu() {
            mobileMenu.classList.add('active');
            menuOverlay.classList.add('active');
        }

        function closeMenu() {
            mobileMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
        }

        hamburger.addEventListener('click', openMenu);
        document.getElementById('close-menu').addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu);
        document.getElementById('logo-home').addEventListener('click', () => navigateTo('home'));

        // Particelle Sfondo
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(0, 229, 255, 0.3)";
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initParticles);
        initParticles();
        animate();

        // Init
        updateMenuContent('main');
        navigateTo('home');

    </script>
</body>
</html>
