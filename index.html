<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav Dashboard Pro - Navigazione Avanzata</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --nav-height: 75px;
            --footer-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.35;
            z-index: 0;
            pointer-events: none;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ===================== NAV ===================== */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            height: var(--nav-height);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.92);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .logo-text span {
            color: var(--accent-cyan);
        }

        .logo-text i {
            margin-right: 8px;
            color: var(--accent-cyan);
        }

        .hamburger {
            display: block;
            cursor: pointer;
            z-index: 1100;
            background: transparent;
            border: none;
            padding: 10px;
        }

        .bar {
            display: block;
            width: 30px;
            height: 3px;
            margin: 6px auto;
            background-color: var(--accent-cyan);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        /* ===================== MAIN ===================== */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: var(--nav-height);
            padding-bottom: var(--footer-height);
            padding-left: 8%;
            padding-right: 8%;
            position: relative;
            z-index: 1;
        }

        .hero-header {
            text-align: center;
        }

        .hero-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 14px;
            background: linear-gradient(135deg, #fff 30%, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-header h1 .version {
            font-size: 1rem;
            background: none;
            -webkit-text-fill-color: var(--accent-cyan);
            color: var(--accent-cyan);
            letter-spacing: 1px;
        }

        .hero-header p {
            color: #aaa;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        /* ===================== FOOTER ===================== */
        .footer-credits {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--footer-height);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            border-top: 1px solid var(--border);
            background: rgba(2, 5, 10, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 900;
        }

        .footer-credits p {
            color: #888;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .footer-credits .developers {
            margin-top: 4px;
            font-size: 0.85rem;
            color: var(--accent-cyan);
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-credits .developers i {
            color: #fff;
            font-size: 0.75rem;
        }

        .footer-credits .developers strong {
            color: #fff;
            font-weight: 400;
        }

        /* ===================== MOBILE MENU ===================== */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1040;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 380px;
            height: 100vh;
            background: rgba(2, 5, 10, 0.98);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-left: 2px solid var(--accent-cyan);
            z-index: 1050;
            transition: right 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding-top: 100px;
            box-shadow: -10px 0 50px rgba(0, 229, 255, 0.2);
        }

        .mobile-menu.active {
            right: 0;
        }

        .menu-header {
            position: absolute;
            top: 25px;
            left: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--accent-cyan);
            padding-bottom: 8px;
        }

        .menu-header i {
            margin-right: 8px;
        }

        .mobile-nav-links {
            list-style: none;
            padding: 0 30px;
        }

        .mobile-nav-links li {
            margin: 0;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.4s ease;
        }

        .mobile-menu.active .mobile-nav-links li {
            opacity: 1;
            transform: translateX(0);
        }

        .mobile-menu.active .mobile-nav-links li:nth-child(1) { transition-delay: 0.1s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(2) { transition-delay: 0.2s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(3) { transition-delay: 0.3s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(4) { transition-delay: 0.4s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(5) { transition-delay: 0.5s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(6) { transition-delay: 0.6s; }

        .mobile-nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .mobile-nav-links a i {
            width: 35px;
            font-size: 1.3rem;
            color: var(--accent-cyan);
            flex-shrink: 0;
        }

        .mobile-nav-links a:hover {
            color: var(--accent-cyan);
            padding-left: 20px;
            border-bottom-color: var(--accent-cyan);
        }

        .close-menu {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            border: none;
            color: var(--accent-cyan);
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.3s;
            line-height: 1;
        }

        .close-menu:hover {
            transform: rotate(90deg);
            color: #fff;
        }

        /* ===================== ANIMATIONS ===================== */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===================== SCROLLBAR ===================== */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 4px; }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 768px) {
            :root {
                --nav-height: 65px;
                --footer-height: 65px;
            }

            .logo-text {
                font-size: 1.3rem;
            }

            .mobile-menu {
                width: 100%;
                border-left: none;
                border-top: 2px solid var(--accent-cyan);
            }

            .footer-credits .developers {
                font-size: 0.7rem;
                gap: 5px;
            }

            .footer-credits .developers i.sep {
                display: none;
            }
        }

        @media (max-width: 400px) {
            .footer-credits p {
                font-size: 0.65rem;
            }
            .footer-credits .developers {
                font-size: 0.62rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>

    <!-- NAV -->
    <nav id="navbar">
        <div class="logo-text">
            <i class="fas fa-compass-drafting"></i> NAV<span>TECH</span>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Apri menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </nav>

    <!-- OVERLAY -->
    <div class="menu-overlay" id="menu-overlay"></div>

    <!-- MOBILE MENU -->
    <div class="mobile-menu" id="mobile-menu" role="dialog" aria-label="Menu di navigazione">
        <div class="menu-header">
            <i class="fas fa-compass"></i> NAVIGAZIONE
        </div>
        <button class="close-menu" id="close-menu" aria-label="Chiudi menu">
            <i class="fas fa-times"></i>
        </button>
        <ul class="mobile-nav-links">
            <li><a href="#" data-page="vento"><i class="fas fa-wind"></i> Problema del Vento</a></li>
            <li><a href="#" data-page="lossodromia"><i class="fas fa-route"></i> Lossodromia</a></li>
            <li><a href="#" data-page="ortodromia"><i class="fas fa-earth-americas"></i> Ortodromia</a></li>
            <li><a href="#" data-page="pnr"><i class="fas fa-map-location-dot"></i> PNR</a></li>
            <li><a href="#" data-page="per"><i class="fas fa-clock-rotate-left"></i> PET</a></li>
            <li><a href="#" data-page="intercettamento"><i class="fas fa-crosshairs"></i> Intercettamento</a></li>
        </ul>
    </div>

    <!-- MAIN -->
    <main class="main-container">
        <header class="hero-header reveal">
            <h1>Flight Computer <span class="version">v3.5</span></h1>
            <p>Sistema integrato per il calcolo delle rotte e parametri di navigazione</p>
        </header>
    </main>

    <!-- FOOTER FISSO -->
    <footer class="footer-credits">
        <p>Sistema di Navigazione Avanzata</p>
        <div class="developers">
            <span>Sviluppato da</span>
            <i class="fas fa-code"></i>
            <strong>Alessio Lucchini</strong>
            <i class="fas fa-plus sep"></i>
            <strong>Andrea Squizzato</strong>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        // ===== MENU =====
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const closeMenuBtn = document.getElementById('close-menu');
        const bars = document.querySelectorAll('.bar');

        function openMenu() {
            mobileMenu.classList.add('active');
            menuOverlay.classList.add('active');
            bars[0].style.transform = 'rotate(-45deg) translate(-6px, 7px)';
            bars[1].style.opacity = '0';
            bars[2].style.transform = 'rotate(45deg) translate(-6px, -7px)';
        }

        function closeMenu() {
            mobileMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
            bars[0].style.transform = '';
            bars[1].style.opacity = '';
            bars[2].style.transform = '';
        }

        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            mobileMenu.classList.contains('active') ? closeMenu() : openMenu();
        });

        closeMenuBtn.addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu);

        // ESC key closes menu
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && mobileMenu.classList.contains('active')) closeMenu();
        });

        // ===== MODULE PAGES =====
        const pageTitles = {
            vento: 'Problema del Vento',
            lossodromia: 'Lossodromia',
            ortodromia: 'Ortodromia',
            pnr: 'PNR',
            per: 'PET',
            intercettamento: 'Intercettamento'
        };

        const pageIcons = {
            vento: 'wind',
            lossodromia: 'route',
            ortodromia: 'earth-americas',
            pnr: 'map-location-dot',
            per: 'clock-rotate-left',
            intercettamento: 'crosshairs'
        };

        function openModule(pageKey) {
            const pageName = pageTitles[pageKey];
            const icon = pageIcons[pageKey];
            const newWindow = window.open('about:blank', '_blank');
            if (!newWindow) return;

            newWindow.document.title = pageName + ' - NavTech';

            newWindow.document.head.innerHTML = `
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>${pageName} - NavTech</title>
                <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    body {
                        background: linear-gradient(135deg, #02050a 0%, #0a1420 100%);
                        color: #fff;
                        font-family: 'Poppins', sans-serif;
                        min-height: 100vh;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        flex-direction: column;
                        text-align: center;
                        padding: 40px 20px;
                    }
                    .icon-wrap {
                        font-size: 5rem;
                        color: #00e5ff;
                        margin-bottom: 30px;
                        filter: drop-shadow(0 0 20px rgba(0,229,255,0.5));
                        animation: pulse 2.5s ease-in-out infinite;
                    }
                    @keyframes pulse {
                        0%, 100% { filter: drop-shadow(0 0 20px rgba(0,229,255,0.5)); }
                        50% { filter: drop-shadow(0 0 40px rgba(0,229,255,0.9)); }
                    }
                    h1 {
                        font-family: 'Orbitron', sans-serif;
                        color: #00e5ff;
                        font-size: clamp(1.8rem, 5vw, 2.5rem);
                        margin-bottom: 20px;
                        letter-spacing: 2px;
                    }
                    .divider {
                        width: 120px;
                        height: 2px;
                        background: linear-gradient(90deg, transparent, #00e5ff, transparent);
                        margin: 0 auto 30px;
                    }
                    p.status {
                        font-size: 1.1rem;
                        color: #aaa;
                    }
                    p.credit {
                        margin-top: 50px;
                        font-size: 0.8rem;
                        color: #00e5ff;
                        font-family: 'Orbitron', sans-serif;
                        letter-spacing: 1px;
                    }
                    button.chiudi {
                        margin-top: 35px;
                        background: transparent;
                        border: 1px solid #00e5ff;
                        color: #00e5ff;
                        padding: 12px 36px;
                        border-radius: 4px;
                        cursor: pointer;
                        font-family: 'Poppins', sans-serif;
                        font-size: 1rem;
                        letter-spacing: 1px;
                        transition: all 0.3s;
                    }
                    button.chiudi:hover {
                        background: #00e5ff;
                        color: #02050a;
                    }
                </style>
            `;

            newWindow.document.body.innerHTML = `
                <div class="icon-wrap"><i class="fas fa-${icon}"></i></div>
                <h1>${pageName}</h1>
                <div class="divider"></div>
                <p class="status">Modulo in fase di sviluppo</p>
                <p class="credit">Sviluppato da Alessio Lucchini &amp; Andrea Squizzato</p>
                <button class="chiudi" onclick="window.close()">Chiudi</button>
            `;
        }

        document.querySelectorAll('.mobile-nav-links a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const pageKey = link.getAttribute('data-page');
                openModule(pageKey);
                closeMenu();
            });
        });

        // ===== PARTICLES =====
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.5 + 0.2
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 229, 255, ${p.alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(initParticles, 200);
        });

        initParticles();
        drawParticles();

        // ===== REVEAL ON LOAD =====
        window.addEventListener('load', () => {
            document.querySelectorAll('.reveal').forEach(el => {
                el.classList.add('active');
            });
        });

        // ===== VANILLA TILT =====
        if (typeof VanillaTilt !== 'undefined') {
            VanillaTilt.init(document.querySelectorAll("[data-tilt]"), {
                max: 12, speed: 400, glare: true, "max-glare": 0.2, scale: 1.02
            });
        }
    </script>
</body>
</html>
