<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NavTech Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --border: rgba(0, 229, 255, 0.3);
            --card-bg: rgba(10, 20, 30, 0.8);
            --transition-menu: all 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- SFONDO E PARTICELLE --- */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        /* --- NAVBAR --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }
        .logo-text span { color: var(--accent-cyan); }
        .logo-text i { color: var(--accent-cyan); }

        /* --- HAMBURGER ANIMATO --- */
        .hamburger {
            cursor: pointer;
            z-index: 2000;
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            gap: 7px;
            padding: 10px;
        }

        .bar {
            width: 32px;
            height: 3px;
            background-color: var(--accent-cyan);
            transition: var(--transition-menu);
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        /* Stato Attivo Hamburger (X) */
        .hamburger.active .bar:nth-child(1) { transform: translateY(10px) rotate(45deg); }
        .hamburger.active .bar:nth-child(2) { opacity: 0; transform: translateX(-20px); }
        .hamburger.active .bar:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

        /* --- MENU LATERALE --- */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%; /* Inizia nascosto fuori schermo */
            width: 400px;
            height: 100vh;
            background: rgba(2, 5, 10, 0.98);
            backdrop-filter: blur(30px);
            border-left: 2px solid var(--accent-cyan);
            z-index: 1500;
            transition: var(--transition-menu);
            padding: 120px 50px;
            display: flex;
            flex-direction: column;
            box-shadow: -20px 0 50px rgba(0,0,0,0.8);
        }

        .mobile-menu.active {
            right: 0; /* Scivola dentro */
        }

        .menu-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--accent-cyan);
            margin-bottom: 30px;
            letter-spacing: 5px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .mobile-nav-links {
            list-style: none;
        }

        .mobile-nav-links li {
            margin-bottom: 15px;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        /* Animazione staggered: le voci appaiono in sequenza quando il menu è attivo */
        .mobile-menu.active .mobile-nav-links li {
            opacity: 1;
            transform: translateX(0);
        }

        .mobile-nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 1.15rem;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 0;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .mobile-nav-links a i {
            color: var(--accent-cyan);
            width: 25px;
            font-size: 1.3rem;
            text-align: center;
        }

        .mobile-nav-links a:hover {
            color: var(--accent-cyan);
            padding-left: 10px;
            text-shadow: 0 0 15px var(--accent-cyan);
        }

        /* Overlay */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1400;
            opacity: 0;
            visibility: hidden;
            transition: 0.5s;
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* --- CONTENUTO PRINCIPALE --- */
        .main-container {
            flex: 1;
            padding: 120px 8% 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .module-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border-radius: 50px;
            border: 1px solid var(--border);
            padding: 100px 40px;
            width: 100%;
            max-width: 1100px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.15);
            animation: cardFadeIn 0.8s ease-out forwards;
        }

        .module-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            color: var(--accent-cyan);
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
        }

        .divider-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            width: 40%;
            margin: 0 auto;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- FOOTER --- */
        .footer {
            padding: 40px;
            text-align: center;
            background: rgba(2, 5, 10, 0.9);
            border-top: 1px solid var(--border);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
        }
        .footer strong { color: var(--accent-cyan); }

        @media (max-width: 768px) {
            .mobile-menu { width: 100%; }
            .module-title { font-size: 2rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>

    <nav>
        <div class="logo-text" id="home-trigger">
            <i class="fas fa-compass-drafting"></i> NAV<span>TECH</span>
        </div>
        <button class="hamburger" id="nav-toggle">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </nav>

    <div class="menu-overlay" id="overlay"></div>

    <div class="mobile-menu" id="side-nav">
        <div class="menu-header" id="current-menu-title">NAVIGAZIONE</div>
        <ul class="mobile-nav-links" id="menu-links-list">
            </ul>
    </div>

    <main class="main-container" id="view-port">
        </main>

    <footer class="footer">
        SVILUPPATO DA <strong>ALESSIO LUCCHINI</strong> & <strong>ANDREA SQUIZZATO</strong>
    </footer>

    <script>
        const viewPort = document.getElementById('view-port');
        const menuList = document.getElementById('menu-links-list');
        const menuTitle = document.getElementById('current-menu-title');
        const sideNav = document.getElementById('side-nav');
        const overlay = document.getElementById('overlay');
        const navToggle = document.getElementById('nav-toggle');

        // --- CONFIGURAZIONI MENU ---
        const menuMain = [
            { id: 'vento', text: 'Problema del Vento', icon: 'fa-wind' },
            { id: 'lossodromia', text: 'Lossodromia', icon: 'fa-route' },
            { id: 'ortodromia', text: 'Ortodromia', icon: 'fa-earth-americas' },
            { id: 'intercettamento', text: 'Intercettamento', icon: 'fa-crosshairs' },
            { id: 'pnr', text: 'PNR', icon: 'fa-map-location-dot' },
            { id: 'pet', text: 'PET', icon: 'fa-clock-rotate-left' }
        ];

        const menuWind = [
            { id: 'v1', text: '1° Problema Vento', icon: 'fa-chevron-right' },
            { id: 'v2', text: '2° Problema Vento', icon: 'fa-chevron-right' },
            { id: 'v3', text: '3° Problema Vento', icon: 'fa-chevron-right' },
            { id: 'v4', text: '4° Problema Vento', icon: 'fa-chevron-right' }
        ];

        // --- GESTIONE LOGICA MENU ---
        function buildMenu(items, label) {
            menuTitle.innerText = label;
            menuList.innerHTML = '';
            
            items.forEach((item, index) => {
                const li = document.createElement('li');
                // Assegna il ritardo per l'animazione di entrata
                li.style.transitionDelay = `${0.1 * (index + 1)}s`;
                
                const a = document.createElement('a');
                a.href = "#";
                a.innerHTML = `<i class="fas ${item.icon}"></i> ${item.text}`;
                
                a.onclick = (e) => {
                    e.preventDefault();
                    processClick(item.id, item.text);
                };
                
                li.appendChild(a);
                menuList.appendChild(li);
            });
        }

        function processClick(id, title) {
            closeMenu();

            setTimeout(() => {
                if (id === 'vento') {
                    buildMenu(menuWind, 'PROBLEMI VENTO');
                    renderView(title);
                } else {
                    renderView(title);
                }
            }, 400);
        }

        function renderView(title) {
            viewPort.style.opacity = '0';
            setTimeout(() => {
                viewPort.innerHTML = `
                    <div class="module-card">
                        <h1 class="module-title">${title}</h1>
                        <div class="divider-line"></div>
                    </div>
                `;
                viewPort.style.opacity = '1';
                document.title = "NavTech | " + title;
            }, 300);
        }

        function returnHome() {
            viewPort.innerHTML = ''; // Home pulita
            buildMenu(menuMain, 'NAVIGAZIONE');
            document.title = "NavTech Professional";
            closeMenu();
        }

        // --- CONTROLLI UI ---
        function openMenu() {
            sideNav.classList.add('active');
            overlay.classList.add('active');
            navToggle.classList.add('active');
        }

        function closeMenu() {
            sideNav.classList.remove('active');
            overlay.classList.remove('active');
            navToggle.classList.remove('active');
        }

        navToggle.addEventListener('click', () => {
            if (sideNav.classList.contains('active')) closeMenu();
            else openMenu();
        });

        overlay.addEventListener('click', closeMenu);
        document.getElementById('home-trigger').onclick = returnHome;

        // --- SFONDO PARTICELLE ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    sz: Math.random() * 2 + 1,
                    dx: (Math.random() - 0.5) * 0.5,
                    dy: (Math.random() - 0.5) * 0.5
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.dx;
                p.y += p.dy;
                if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.sz, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(0, 229, 255, 0.4)";
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.onresize = initParticles;
        initParticles();
        animate();

        // Inizio: Carica menu principale e pulisce vista
        returnHome();
    </script>
</body>
</html>
