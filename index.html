<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NavTech | Navigazione Professionale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(10, 20, 30, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.35;
            z-index: -1;
            pointer-events: none;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
        }
        .logo-text:hover {
            text-shadow: 0 0 8px var(--accent-cyan);
        }

        .logo-text span {
            color: var(--accent-cyan);
        }

        .logo-text i {
            margin-right: 8px;
            color: var(--accent-cyan);
        }

        .hamburger {
            display: block;
            cursor: pointer;
            z-index: 1100;
            background: transparent;
            border: none;
            padding: 10px;
        }

        .bar {
            display: block;
            width: 30px;
            height: 3px;
            margin: 6px auto;
            background-color: var(--accent-cyan);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 380px;
            height: 100vh;
            background: rgba(2, 5, 10, 0.98);
            backdrop-filter: blur(25px);
            border-left: 2px solid var(--accent-cyan);
            z-index: 1050;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding-top: 100px;
            box-shadow: -10px 0 50px rgba(0, 229, 255, 0.2);
        }

        .mobile-menu.active {
            right: 0;
        }

        .menu-header {
            position: absolute;
            top: 25px;
            left: 30px;
            right: 60px;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--accent-cyan);
            padding-bottom: 8px;
            font-size: 0.9rem;
        }

        .menu-header i {
            margin-right: 8px;
        }

        .mobile-nav-links {
            list-style: none;
            padding: 0 30px;
        }

        .mobile-nav-links li {
            margin: 0;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.4s ease;
        }

        .mobile-menu.active .mobile-nav-links li {
            opacity: 1;
            transform: translateX(0);
        }

        .mobile-nav-links li:nth-child(1) { transition-delay: 0.1s; }
        .mobile-nav-links li:nth-child(2) { transition-delay: 0.2s; }
        .mobile-nav-links li:nth-child(3) { transition-delay: 0.3s; }
        .mobile-nav-links li:nth-child(4) { transition-delay: 0.4s; }
        .mobile-nav-links li:nth-child(5) { transition-delay: 0.5s; }
        .mobile-nav-links li:nth-child(6) { transition-delay: 0.6s; }

        .mobile-nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 1.25rem;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .mobile-nav-links a i {
            width: 35px;
            font-size: 1.4rem;
            color: var(--accent-cyan);
        }

        .mobile-nav-links a:hover {
            color: var(--accent-cyan);
            padding-left: 20px;
            border-bottom-color: var(--accent-cyan);
        }

        .close-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--accent-cyan);
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1060;
        }

        .close-menu:hover {
            transform: rotate(90deg);
            color: #fff;
        }

        .main-container {
            flex: 1;
            padding: 140px 8% 100px;
            min-height: 100vh;
        }

        .module-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .module-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.1);
            border-color: var(--accent-cyan);
        }
        .module-title {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            color: var(--accent-cyan);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .module-title i {
            font-size: 2rem;
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            width: 100px;
            margin: 1rem 0 1.5rem 0;
        }

        .calculator-form {
            margin: 20px 0;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .input-field {
            flex: 1;
            min-width: 150px;
        }
        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-family: 'Orbitron', monospace;
            color: var(--accent-cyan);
            font-size: 0.9rem;
        }
        .input-field input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: 0.2s;
        }
        .input-field input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 8px rgba(0,229,255,0.3);
        }
        button.calcola {
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 1rem;
            color: #02050a;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        button.calcola:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px var(--accent-cyan);
        }
        .results {
            margin-top: 30px;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        .result-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(0,229,255,0.2);
            transition: 0.2s;
        }
        .result-card:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 20, 30, 0.7);
        }
        .result-name {
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            color: var(--accent-cyan);
            margin-bottom: 12px;
            border-left: 3px solid var(--accent-cyan);
            padding-left: 12px;
        }
        .detail-formula {
            font-family: monospace;
            background: rgba(0,229,255,0.1);
            padding: 8px;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .detail-substitution {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 0.85rem;
            color: #ccc;
        }
        .detail-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            margin-top: 12px;
            text-align: right;
            border-top: 1px dashed rgba(0,229,255,0.3);
            padding-top: 10px;
        }
        .final-results {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .final-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(0,229,255,0.2);
        }
        .error-message {
            background: rgba(255,0,0,0.2);
            border-left: 4px solid #ff4444;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            color: #ff8888;
        }
        .footer-credits {
            position: relative;
            width: 100%;
            padding: 20px 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(10px);
            z-index: 900;
            margin-top: auto;
        }
        .footer-credits p {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .footer-credits .developers {
            margin-top: 5px;
            font-size: 0.9rem;
            color: var(--accent-cyan);
            font-family: 'Orbitron', sans-serif;
        }
        .footer-credits .developers i {
            margin: 0 8px;
            color: #fff;
            font-size: 0.8rem;
        }
        .footer-credits .developers span {
            color: #fff;
            font-weight: 300;
        }

        .problemi-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
            margin-top: 10px;
        }
        .problema-preview-card {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(0, 229, 255, 0.25);
            border-radius: 18px;
            padding: 22px 20px 18px 20px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background 0.2s;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .problema-preview-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.15);
            border-color: var(--accent-cyan);
            background: rgba(0, 20, 30, 0.7);
        }
        .problema-preview-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.15rem;
            color: var(--accent-cyan);
            border-left: 3px solid var(--accent-cyan);
            padding-left: 12px;
            line-height: 1.3;
            margin-bottom: 8px;
        }
        .problema-preview-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .problema-preview-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            font-family: 'Orbitron', sans-serif;
        }
        .problema-preview-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .badge-dati {
            background: rgba(0, 229, 255, 0.12);
            border: 1px solid rgba(0, 229, 255, 0.35);
            color: var(--accent-cyan);
            border-radius: 20px;
            padding: 3px 11px;
            font-size: 0.82rem;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
        }
        .badge-incognite {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 20px;
            padding: 3px 11px;
            font-size: 0.82rem;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
        }

        .info-message {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 0.95rem;
        }
        .info-message i {
            color: var(--accent-cyan);
            margin-right: 10px;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1040;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 768px) {
            .mobile-menu { width: 100%; }
            .main-container { padding: 120px 5% 80px; }
            .module-title { font-size: 1.5rem; }
            .input-group { flex-direction: column; gap: 12px; }
            .problemi-overview { grid-template-columns: 1fr; }
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 4px; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>

    <nav id="navbar">
        <div class="logo-text" id="logo-home">
            <i class="fas fa-compass-drafting"></i> NAV<span>TECH</span>
        </div>
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>

    <div class="mobile-menu" id="mobile-menu">
        <div class="menu-header"><i class="fas fa-compass"></i> NAVIGAZIONE</div>
        <button class="close-menu" id="close-menu"><i class="fas fa-times"></i></button>
        <ul class="mobile-nav-links">
            <li><a href="#" data-page="vento"><i class="fas fa-wind"></i> Problema del Vento</a></li>
            <li><a href="#" data-page="lossodromia"><i class="fas fa-route"></i> Lossodromia</a></li>
            <li><a href="#" data-page="ortodromia"><i class="fas fa-earth-americas"></i> Ortodromia</a></li>
            <li><a href="#" data-page="pnr"><i class="fas fa-map-location-dot"></i> PNR</a></li>
            <li><a href="#" data-page="per"><i class="fas fa-clock-rotate-left"></i> PET</a></li>
            <li><a href="#" data-page="intercettamento"><i class="fas fa-crosshairs"></i> Intercettamento</a></li>
        </ul>
    </div>

    <main class="main-container" id="main-container"></main>

    <footer class="footer-credits reveal">
        <p>Sistema di Navigazione Avanzata</p>
        <div class="developers">
            <span>Sviluppato da</span>
            <i class="fas fa-code"></i>
            <strong>Alessio Lucchini</strong>
            <i class="fas fa-plus"></i>
            <strong>Andrea Squizzato</strong>
        </div>
    </footer>

    <script>
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const closeMenuBtn = document.getElementById('close-menu');
        let currentModule = 'home';

        function setHamburgerOpen() {
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(-45deg) translate(-6px, 7px)';
            bars[1].style.opacity = '0';
            bars[2].style.transform = 'rotate(45deg) translate(-6px, -7px)';
        }
        function setHamburgerClosed() {
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(0) translate(0, 0)';
            bars[1].style.opacity = '1';
            bars[2].style.transform = 'rotate(0) translate(0, 0)';
        }

        function openMenu() {
            mobileMenu.classList.add('active');
            menuOverlay.classList.add('active');
            setHamburgerOpen();
        }
        function closeMenu() {
            mobileMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
            setHamburgerClosed();
        }

        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (mobileMenu.classList.contains('active')) closeMenu();
            else openMenu();
        });

        closeMenuBtn.addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu);

        function getHomeHTML() {
            return `
                <div class="reveal active">
                    <div style="text-align:center; padding: 20px 0 60px 0;">
                        <div style="display:inline-block; background: radial-gradient(ellipse at center, rgba(0,229,255,0.08) 0%, transparent 70%); border-radius: 50%; width: 220px; height: 220px; margin: 0 auto 30px auto; display:flex; align-items:center; justify-content:center; position:relative;">
                            <div style="position:absolute; width:220px; height:220px; border-radius:50%; border: 1px solid rgba(0,229,255,0.15); animation: radarPulse 3s ease-out infinite;"></div>
                            <div style="position:absolute; width:160px; height:160px; border-radius:50%; border: 1px solid rgba(0,229,255,0.25); animation: radarPulse 3s ease-out infinite 0.6s;"></div>
                            <div style="position:absolute; width:100px; height:100px; border-radius:50%; border: 1px solid rgba(0,229,255,0.4); animation: radarPulse 3s ease-out infinite 1.2s;"></div>
                            <svg width="80" height="80" viewBox="0 0 80 80" style="position:relative; z-index:2;">
                                <circle cx="40" cy="40" r="38" fill="none" stroke="rgba(0,229,255,0.4)" stroke-width="1.5"/>
                                <circle cx="40" cy="40" r="3" fill="#00e5ff"/>
                                <text x="40" y="13" text-anchor="middle" font-family="Orbitron" font-size="9" fill="#00e5ff" font-weight="700">N</text>
                                <text x="40" y="73" text-anchor="middle" font-family="Orbitron" font-size="9" fill="rgba(255,255,255,0.4)">S</text>
                                <text x="71" y="44" text-anchor="middle" font-family="Orbitron" font-size="9" fill="rgba(255,255,255,0.4)">E</text>
                                <text x="9" y="44" text-anchor="middle" font-family="Orbitron" font-size="9" fill="rgba(255,255,255,0.4)">W</text>
                                <polygon points="40,14 37,42 40,38 43,42" fill="#00e5ff" opacity="0.95"/>
                                <polygon points="40,66 37,38 40,42 43,38" fill="rgba(255,255,255,0.25)"/>
                                <line x1="40" y1="4" x2="40" y2="9" stroke="rgba(0,229,255,0.5)" stroke-width="1.5"/>
                                <line x1="40" y1="71" x2="40" y2="76" stroke="rgba(0,229,255,0.3)" stroke-width="1.5"/>
                                <line x1="4" y1="40" x2="9" y2="40" stroke="rgba(0,229,255,0.3)" stroke-width="1.5"/>
                                <line x1="71" y1="40" x2="76" y2="40" stroke="rgba(0,229,255,0.3)" stroke-width="1.5"/>
                            </svg>
                        </div>
                        <div style="font-family:'Orbitron',sans-serif; font-size:3rem; font-weight:700; letter-spacing:6px; margin-bottom:10px;">NAV<span style="color:var(--accent-cyan);">TECH</span></div>
                        <div style="font-family:'Orbitron',sans-serif; font-size:0.72rem; letter-spacing:5px; color:rgba(0,229,255,0.6); margin-bottom:18px;">Sistema di Navigazione Avanzata</div>
                        <div style="width:120px; height:1px; margin:0 auto 24px auto; background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);"></div>
                        <p style="color:rgba(255,255,255,0.45); font-size:0.9rem; max-width:420px; margin:0 auto; line-height:1.8;">Strumenti di calcolo professionale per la navigazione aerea.<br>Seleziona un modulo dal menu.</p>
                    </div>
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:18px; max-width:1000px; margin:0 auto;">
                        ${[
                            { icon:'fa-wind', label:'Problema del Vento', page:'vento' },
                            { icon:'fa-route', label:'Lossodromia', page:'lossodromia' },
                            { icon:'fa-earth-americas', label:'Ortodromia', page:'ortodromia' },
                            { icon:'fa-map-location-dot', label:'PNR', page:'pnr' },
                            { icon:'fa-clock-rotate-left', label:'PET', page:'per' },
                            { icon:'fa-crosshairs', label:'Intercettamento', page:'intercettamento' }
                        ].map(m => `
                        <div class="home-module-card" data-page="${m.page}" style="background: rgba(0,0,0,0.45); border: 1px solid rgba(0,229,255,0.18); border-radius:20px; padding:28px 22px; cursor:pointer; transition: all 0.25s; display:flex; flex-direction:column; gap:14px;">
                            <div style="display:flex; align-items:center; gap:14px;">
                                <div style="width:46px; height:46px; border-radius:14px; background:rgba(0,229,255,0.1); border:1px solid rgba(0,229,255,0.3); display:flex; align-items:center; justify-content:center;">
                                    <i class="fas ${m.icon}" style="color:var(--accent-cyan); font-size:1.2rem;"></i>
                                </div>
                                <div style="font-family:'Orbitron',sans-serif; font-size:0.95rem; color:#fff;">${m.label}</div>
                            </div>
                            <div style="font-size:0.78rem; color:rgba(255,255,255,0.38); border-top:1px solid rgba(0,229,255,0.1); padding-top:12px;">Clicca per accedere</div>
                        </div>
                        `).join('')}
                    </div>
                    <style>
                        @keyframes radarPulse {
                            0% { transform:scale(1); opacity:0.6; }
                            100% { transform:scale(1.35); opacity:0; }
                        }
                        .home-module-card:hover {
                            transform: translateY(-5px);
                            box-shadow: 0 12px 35px rgba(0,229,255,0.18);
                            border-color: var(--accent-cyan);
                            background: rgba(0,20,30,0.75);
                        }
                    </style>
                </div>
            `;
        }

        function getVentoHTML() {
            return `
                <div class="reveal active">
                    <div class="module-card">
                        <div class="module-title"><i class="fas fa-wind"></i> Problema del Vento</div>
                        <div class="divider"></div>
                        <div id="problemDetailContainer">
                            <div class="info-message"><i class="fas fa-info-circle"></i> Seleziona un problema dal menu laterale</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getLossodromiaHTML() {
            return `
                <div class="reveal active">
                    <div class="module-card">
                        <div class="module-title"><i class="fas fa-route"></i> Lossodromia</div>
                        <div class="divider"></div>
                        <div id="lossodromiaDetailContainer">
                            <div class="info-message"><i class="fas fa-info-circle"></i> Seleziona un problema dal menu laterale</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getOrtodromiaHTML() {
            return `<div class="reveal active"><div class="module-card"><div class="module-title"><i class="fas fa-earth-americas"></i> Ortodromia</div><div class="divider"></div><p style="text-align:center; padding:40px;">Modulo in fase di sviluppo</p></div></div>`;
        }

        function getPnrHTML() {
            return `
                <div class="reveal active">
                    <div class="module-card">
                        <div class="module-title"><i class="fas fa-map-location-dot"></i> PNR</div>
                        <div class="divider"></div>
                        <div id="pnrDetailContainer">
                            <div class="info-message"><i class="fas fa-info-circle"></i> Seleziona una tipologia dal menu laterale</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getPerHTML() {
            return `<div class="reveal active"><div class="module-card"><div class="module-title"><i class="fas fa-clock-rotate-left"></i> PET</div><div class="divider"></div><p style="text-align:center; padding:40px;">Modulo in fase di sviluppo</p></div></div>`;
        }

        function getIntercettamentoHTML() {
            return `
                <div class="reveal active">
                    <div class="module-card">
                        <div class="module-title"><i class="fas fa-crosshairs"></i> Intercettamento</div>
                        <div class="divider"></div>
                        <div id="intercettamentoDetailContainer">
                            <div class="info-message"><i class="fas fa-info-circle"></i> Seleziona una tipologia dal menu laterale</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getModuleHTML(moduleId) {
            switch(moduleId) {
                case 'home': return getHomeHTML();
                case 'vento': return getVentoHTML();
                case 'lossodromia': return getLossodromiaHTML();
                case 'ortodromia': return getOrtodromiaHTML();
                case 'pnr': return getPnrHTML();
                case 'per': return getPerHTML();
                case 'intercettamento': return getIntercettamentoHTML();
                default: return getHomeHTML();
            }
        }

        function navigateTo(moduleId, addToHistory = true) {
            currentModule = moduleId;
            closeMenu();
            const container = document.getElementById('main-container');
            if (!container) return;
            container.innerHTML = getModuleHTML(moduleId);

            const titles = {
                home: 'NavTech | Navigazione Professionale',
                vento: 'NavTech | Problema del Vento',
                lossodromia: 'NavTech | Lossodromia',
                ortodromia: 'NavTech | Ortodromia',
                pnr: 'NavTech | PNR',
                per: 'NavTech | PET',
                intercettamento: 'NavTech | Intercettamento'
            };
            document.title = titles[moduleId] || 'NavTech';

            container.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));

            if (addToHistory) {
                const url = new URL(window.location);
                url.searchParams.set('nav', moduleId);
                window.history.pushState({ module: moduleId }, '', url);
            }
        }

        document.querySelectorAll('.mobile-nav-links a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const pageKey = link.getAttribute('data-page');
                if (pageKey) navigateTo(pageKey, true);
            });
        });

        document.getElementById('logo-home').addEventListener('click', () => navigateTo('home', true));

        setTimeout(() => {
            document.querySelectorAll('.home-module-card').forEach(card => {
                card.addEventListener('click', () => {
                    const page = card.getAttribute('data-page');
                    if (page) navigateTo(page, true);
                });
            });
        }, 100);

        window.addEventListener('popstate', (event) => {
            let moduleId = 'home';
            if (event.state && event.state.module) moduleId = event.state.module;
            else moduleId = new URLSearchParams(window.location.search).get('nav') || 'home';
            navigateTo(moduleId, false);
        });

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.5 + 0.2
                });
            }
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 229, 255, ${p.alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', initParticles);
        initParticles();
        drawParticles();

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => entry.isIntersecting && entry.target.classList.add('active'));
        }, { threshold: 0.15 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        const initialParam = new URLSearchParams(window.location.search).get('nav');
        if (initialParam && ['vento','lossodromia','ortodromia','pnr','per','intercettamento'].includes(initialParam)) {
            navigateTo(initialParam, false);
        } else {
            navigateTo('home', false);
        }
    </script>
</body>
</html>
