<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NavTech | Navigazione Professionale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(10, 20, 30, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.35;
            z-index: -1;
            pointer-events: none;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
        }
        .logo-text:hover {
            text-shadow: 0 0 8px var(--accent-cyan);
        }

        .logo-text span {
            color: var(--accent-cyan);
        }

        .logo-text i {
            margin-right: 8px;
            color: var(--accent-cyan);
        }

        .hamburger {
            display: block;
            cursor: pointer;
            z-index: 1100;
            background: transparent;
            border: none;
            padding: 10px;
        }

        .bar {
            display: block;
            width: 30px;
            height: 3px;
            margin: 6px auto;
            background-color: var(--accent-cyan);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        /* Menu principale (globale) e menu contestuale (vento) condividono gli stessi stili */
        .mobile-menu, .mobile-menu-vento {
            position: fixed;
            top: 0;
            right: -100%;
            width: 380px;
            height: 100vh;
            background: rgba(2, 5, 10, 0.98);
            backdrop-filter: blur(25px);
            border-left: 2px solid var(--accent-cyan);
            z-index: 1050;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding-top: 100px;
            box-shadow: -10px 0 50px rgba(0, 229, 255, 0.2);
        }

        .mobile-menu.active, .mobile-menu-vento.active {
            right: 0;
        }

        .menu-header {
            position: absolute;
            top: 25px;
            left: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--accent-cyan);
            padding-bottom: 8px;
        }

        .menu-header i {
            margin-right: 8px;
        }

        .mobile-nav-links, .mobile-nav-links-vento {
            list-style: none;
            padding: 0 30px;
        }

        .mobile-nav-links li, .mobile-nav-links-vento li {
            margin: 0;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.4s ease;
        }

        .mobile-menu.active .mobile-nav-links li,
        .mobile-menu-vento.active .mobile-nav-links-vento li {
            opacity: 1;
            transform: translateX(0);
        }

        .mobile-menu.active .mobile-nav-links li:nth-child(1),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(1) { transition-delay: 0.1s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(2),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(2) { transition-delay: 0.2s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(3),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(3) { transition-delay: 0.3s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(4),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(4) { transition-delay: 0.4s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(5),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(5) { transition-delay: 0.5s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(6),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(6) { transition-delay: 0.6s; }

        .mobile-nav-links a, .mobile-nav-links-vento a {
            text-decoration: none;
            color: #fff;
            font-size: 1.25rem;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .mobile-nav-links a i, .mobile-nav-links-vento a i {
            width: 35px;
            font-size: 1.4rem;
            color: var(--accent-cyan);
        }

        .mobile-nav-links a:hover, .mobile-nav-links-vento a:hover {
            color: var(--accent-cyan);
            padding-left: 20px;
            border-bottom-color: var(--accent-cyan);
        }

        .close-menu {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            border: none;
            color: var(--accent-cyan);
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-menu:hover {
            transform: rotate(90deg);
            color: #fff;
        }

        .main-container {
            flex: 1;
            padding: 140px 8% 100px;
            min-height: 100vh;
            transition: all 0.2s;
        }

        /* card styling per moduli: solo contenitore grafico, senza testo interno */
        .module-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            position: relative;
            min-height: 200px;
        }
        .module-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.1);
            border-color: var(--accent-cyan);
        }
        .module-title {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            color: var(--accent-cyan);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .module-title i {
            font-size: 2rem;
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            width: 100px;
            margin: 1rem 0 1.5rem 0;
        }
        .footer-credits {
            position: relative;
            width: 100%;
            padding: 20px 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(10px);
            z-index: 900;
            margin-top: auto;
        }

        .footer-credits p {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .footer-credits .developers {
            margin-top: 5px;
            font-size: 0.9rem;
            color: var(--accent-cyan);
            font-family: 'Orbitron', sans-serif;
        }

        .footer-credits .developers i {
            margin: 0 8px;
            color: #fff;
            font-size: 0.8rem;
        }

        .footer-credits .developers span {
            color: #fff;
            font-weight: 300;
        }

        @media (max-width: 768px) {
            .mobile-menu, .mobile-menu-vento {
                width: 100%;
            }
            .main-container {
                padding: 120px 5% 80px;
            }
            .module-title {
                font-size: 1.5rem;
                flex-wrap: wrap;
            }
            .footer-credits .developers {
                font-size: 0.7rem;
                flex-direction: column;
                gap: 5px;
            }
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-cyan);
            border-radius: 4px;
        }

        .menu-overlay, .menu-overlay-vento {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1040;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .menu-overlay.active, .menu-overlay-vento.active {
            opacity: 1;
            visibility: visible;
        }

        /* area dettaglio problemi vento: rimossa completamente (nessun testo) */
        .problem-detail-box {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>

    <nav id="navbar">
        <div class="logo-text" id="logo-home">
            <i class="fas fa-compass-drafting"></i> NAV<span>TECH</span>
        </div>
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <!-- Overlay per menu principale -->
    <div class="menu-overlay" id="menu-overlay"></div>
    <!-- Overlay per menu contestuale vento -->
    <div class="menu-overlay-vento" id="menu-overlay-vento"></div>

    <!-- Menu principale (globale) -->
    <div class="mobile-menu" id="mobile-menu">
        <div class="menu-header">
            <i class="fas fa-compass"></i> NAVIGAZIONE
        </div>
        <button class="close-menu" id="close-menu">
            <i class="fas fa-times"></i>
        </button>
        <ul class="mobile-nav-links">
            <li><a href="#" data-page="vento"><i class="fas fa-wind"></i> Problema del Vento</a></li>
            <li><a href="#" data-page="lossodromia"><i class="fas fa-route"></i> Lossodromia</a></li>
            <li><a href="#" data-page="ortodromia"><i class="fas fa-earth-americas"></i> Ortodromia</a></li>
            <li><a href="#" data-page="pnr"><i class="fas fa-map-location-dot"></i> PNR</a></li>
            <li><a href="#" data-page="per"><i class="fas fa-clock-rotate-left"></i> PET</a></li>
            <li><a href="#" data-page="intercettamento"><i class="fas fa-crosshairs"></i> Intercettamento</a></li>
        </ul>
    </div>

    <!-- Menu contestuale per Problema del Vento (identico nello stile) -->
    <div class="mobile-menu-vento" id="mobile-menu-vento">
        <div class="menu-header">
            <i class="fas fa-wind"></i> PROBLEMI DEL VENTO
        </div>
        <button class="close-menu" id="close-menu-vento">
            <i class="fas fa-times"></i>
        </button>
        <ul class="mobile-nav-links-vento">
            <li><a href="#" data-subproblem="primo"><i class="fas fa-1"></i> Primo Problema</a></li>
            <li><a href="#" data-subproblem="secondo"><i class="fas fa-2"></i> Secondo Problema</a></li>
            <li><a href="#" data-subproblem="terzo"><i class="fas fa-3"></i> Terzo Problema</a></li>
            <li><a href="#" data-subproblem="quarto"><i class="fas fa-4"></i> Quarto Problema</a></li>
        </ul>
    </div>

    <main class="main-container" id="main-container">
        <!-- contenuto dinamico -->
    </main>

    <footer class="footer-credits reveal">
        <p>Sistema di Navigazione Avanzata</p>
        <div class="developers">
            <span>Sviluppato da</span>
            <i class="fas fa-code"></i>
            <strong>Alessio Lucchini</strong>
            <i class="fas fa-plus"></i>
            <strong>Andrea Squizzato</strong>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        // ---------- GESTIONE MENU PRINCIPALE ----------
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const closeMenuBtn = document.getElementById('close-menu');

        // Menu contestuale vento
        const mobileMenuVento = document.getElementById('mobile-menu-vento');
        const menuOverlayVento = document.getElementById('menu-overlay-vento');
        const closeMenuVentoBtn = document.getElementById('close-menu-vento');

        let currentModule = 'home';

        function openMainMenu() {
            mobileMenu.classList.add('active');
            menuOverlay.classList.add('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(-45deg) translate(-6px, 7px)';
            bars[1].style.opacity = '0';
            bars[2].style.transform = 'rotate(45deg) translate(-6px, -7px)';
        }

        function closeMainMenu() {
            mobileMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(0) translate(0, 0)';
            bars[1].style.opacity = '1';
            bars[2].style.transform = 'rotate(0) translate(0, 0)';
        }

        function openVentoMenu() {
            mobileMenuVento.classList.add('active');
            menuOverlayVento.classList.add('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(-45deg) translate(-6px, 7px)';
            bars[1].style.opacity = '0';
            bars[2].style.transform = 'rotate(45deg) translate(-6px, -7px)';
        }

        function closeVentoMenu() {
            mobileMenuVento.classList.remove('active');
            menuOverlayVento.classList.remove('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(0) translate(0, 0)';
            bars[1].style.opacity = '1';
            bars[2].style.transform = 'rotate(0) translate(0, 0)';
        }

        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentModule === 'vento') {
                if (mobileMenuVento.classList.contains('active')) closeVentoMenu();
                else openVentoMenu();
            } else {
                if (mobileMenu.classList.contains('active')) closeMainMenu();
                else openMainMenu();
            }
        });

        closeMenuBtn.addEventListener('click', closeMainMenu);
        menuOverlay.addEventListener('click', closeMainMenu);
        closeMenuVentoBtn.addEventListener('click', closeVentoMenu);
        menuOverlayVento.addEventListener('click', closeVentoMenu);

        // ---------- CONTENUTI MODULI: TUTTI PULITI, NESSUN TESTO, NESSUNA FORMULA ----------
        function getModuleHTML(moduleId) {
            // home vuota
            if (moduleId === 'home') {
                return `<div class="reveal active" style="min-height: 0;"></div>`;
            }
            // per ogni strumento: solo card con titolo e divisore (opzionale), ma nessun testo, nessuna formula, nessun pannello
            // Per "vento" manteniamo il contenitore del dettaglio (vuoto) perché il menu contestuale è ancora presente,
            // ma non mostrerà mai alcun contenuto (è nascosto via CSS). Non viene visualizzato alcun testo.
            if (moduleId === 'vento') {
                return `
                    <div class="reveal active">
                        <div class="module-card" id="vento-module-card">
                            <div class="module-title"><i class="fas fa-wind"></i> Problema del Vento</div>
                            <div class="divider"></div>
                            <!-- area dettaglio problemi (nascosta e senza contenuto) -->
                            <div id="problemDetailContainer" class="problem-detail-box" style="display: none;"></div>
                        </div>
                    </div>
                `;
            }
            if (moduleId === 'lossodromia') {
                return `
                    <div class="reveal active">
                        <div class="module-card">
                            <div class="module-title"><i class="fas fa-route"></i> Lossodromia</div>
                            <div class="divider"></div>
                        </div>
                    </div>
                `;
            }
            if (moduleId === 'ortodromia') {
                return `
                    <div class="reveal active">
                        <div class="module-card">
                            <div class="module-title"><i class="fas fa-earth-americas"></i> Ortodromia</div>
                            <div class="divider"></div>
                        </div>
                    </div>
                `;
            }
            if (moduleId === 'pnr') {
                return `
                    <div class="reveal active">
                        <div class="module-card">
                            <div class="module-title"><i class="fas fa-map-location-dot"></i> PNR</div>
                            <div class="divider"></div>
                        </div>
                    </div>
                `;
            }
            if (moduleId === 'per') {
                return `
                    <div class="reveal active">
                        <div class="module-card">
                            <div class="module-title"><i class="fas fa-clock-rotate-left"></i> PET</div>
                            <div class="divider"></div>
                        </div>
                    </div>
                `;
            }
            if (moduleId === 'intercettamento') {
                return `
                    <div class="reveal active">
                        <div class="module-card">
                            <div class="module-title"><i class="fas fa-crosshairs"></i> Intercettamento</div>
                            <div class="divider"></div>
                        </div>
                    </div>
                `;
            }
            return `<div class="reveal active" style="min-height: 0;"></div>`;
        }

        // I dettagli dei problemi del vento non vengono più mostrati (nessun contenuto)
        function showProblemDetail(problemKey) {
            // non fa nulla – nessun testo, nessuna formula
            const detailContainer = document.getElementById('problemDetailContainer');
            if (detailContainer) {
                detailContainer.style.display = 'none';
                detailContainer.innerHTML = '';
            }
        }

        // Navigazione tra moduli
        function navigateTo(moduleId, addToHistory = true) {
            currentModule = moduleId;
            const container = document.getElementById('main-container');
            if (!container) return;
            container.innerHTML = getModuleHTML(moduleId);
            
            // Gestione visibilità menu: in vento nascondi menu principale, mostra contestuale; altrimenti viceversa
            if (moduleId === 'vento') {
                closeMainMenu();
                mobileMenuVento.style.display = 'block';
                mobileMenu.style.display = 'none';
                // nessun dettaglio visualizzato
                setTimeout(() => {
                    const detail = document.getElementById('problemDetailContainer');
                    if (detail) detail.style.display = 'none';
                }, 20);
            } else {
                closeVentoMenu();
                mobileMenuVento.style.display = 'none';
                mobileMenu.style.display = 'block';
            }
            
            const reveals = container.querySelectorAll('.reveal');
            reveals.forEach(el => el.classList.add('active'));
            
            const titles = {
                home: 'NavTech | Navigazione',
                vento: 'Problema del Vento - NavTech',
                lossodromia: 'Lossodromia - NavTech',
                ortodromia: 'Ortodromia - NavTech',
                pnr: 'PNR - NavTech',
                per: 'PET - NavTech',
                intercettamento: 'Intercettamento - NavTech'
            };
            document.title = titles[moduleId] || 'NavTech Pro';
            
            if (addToHistory) {
                const state = { module: moduleId };
                const url = new URL(window.location);
                url.searchParams.set('nav', moduleId);
                window.history.pushState(state, '', url);
            }
        }
        
        // Popstate
        window.addEventListener('popstate', (event) => {
            let moduleId = 'home';
            if (event.state && event.state.module) {
                moduleId = event.state.module;
            } else {
                const params = new URLSearchParams(window.location.search);
                moduleId = params.get('nav') || 'home';
            }
            navigateTo(moduleId, false);
        });
        
        // Click menu principale
        document.querySelectorAll('.mobile-nav-links a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const pageKey = link.getAttribute('data-page');
                if (pageKey) {
                    navigateTo(pageKey, true);
                    closeMainMenu();
                }
            });
        });
        
        // Click menu contestuale vento: non mostrare alcun dettaglio
        document.querySelectorAll('.mobile-nav-links-vento a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                // non viene mostrato alcun testo, nessuna formula
                closeVentoMenu();
            });
        });
        
        // Logo -> home pulita
        const logoHome = document.getElementById('logo-home');
        if (logoHome) {
            logoHome.addEventListener('click', () => {
                navigateTo('home', true);
                closeMainMenu();
                closeVentoMenu();
            });
        }
        
        // ---- Effetto particelle ----
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.5 + 0.2
                });
            }
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 229, 255, ${p.alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', () => { initParticles(); });
        initParticles();
        drawParticles();
        
        // Observer per footer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => entry.isIntersecting && entry.target.classList.add('active'));
        }, { threshold: 0.15 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        
        // Avvio: home pulita, menu principale attivo, contestuale nascosto
        mobileMenuVento.style.display = 'none';
        mobileMenu.style.display = 'block';
        const initialParam = new URLSearchParams(window.location.search).get('nav');
        if (initialParam && ['vento','lossodromia','ortodromia','pnr','per','intercettamento'].includes(initialParam)) {
            navigateTo(initialParam, false);
            const state = { module: initialParam };
            window.history.replaceState(state, '', window.location.href);
        } else {
            navigateTo('home', false);
            window.history.replaceState({ module: 'home' }, '', window.location.pathname);
        }
    </script>
</body>
</html>
