<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NavTech | Navigazione Professionale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(10, 20, 30, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.35;
            z-index: -1;
            pointer-events: none;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
        }
        .logo-text:hover {
            text-shadow: 0 0 8px var(--accent-cyan);
        }

        .logo-text span {
            color: var(--accent-cyan);
        }

        .logo-text i {
            margin-right: 8px;
            color: var(--accent-cyan);
        }

        .hamburger {
            display: block;
            cursor: pointer;
            z-index: 1100;
            background: transparent;
            border: none;
            padding: 10px;
        }

        .bar {
            display: block;
            width: 30px;
            height: 3px;
            margin: 6px auto;
            background-color: var(--accent-cyan);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        /* Menu principale e contestuale */
        .mobile-menu, .mobile-menu-vento {
            position: fixed;
            top: 0;
            right: -100%;
            width: 380px;
            height: 100vh;
            background: rgba(2, 5, 10, 0.98);
            backdrop-filter: blur(25px);
            border-left: 2px solid var(--accent-cyan);
            z-index: 1050;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding-top: 100px;
            box-shadow: -10px 0 50px rgba(0, 229, 255, 0.2);
        }

        .mobile-menu.active, .mobile-menu-vento.active {
            right: 0;
        }

        .menu-header {
            position: absolute;
            top: 25px;
            left: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--accent-cyan);
            padding-bottom: 8px;
        }

        .menu-header i {
            margin-right: 8px;
        }

        .mobile-nav-links, .mobile-nav-links-vento {
            list-style: none;
            padding: 0 30px;
        }

        .mobile-nav-links li, .mobile-nav-links-vento li {
            margin: 0;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.4s ease;
        }

        .mobile-menu.active .mobile-nav-links li,
        .mobile-menu-vento.active .mobile-nav-links-vento li {
            opacity: 1;
            transform: translateX(0);
        }

        .mobile-menu.active .mobile-nav-links li:nth-child(1),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(1) { transition-delay: 0.1s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(2),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(2) { transition-delay: 0.2s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(3),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(3) { transition-delay: 0.3s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(4),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(4) { transition-delay: 0.4s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(5),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(5) { transition-delay: 0.5s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(6),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(6) { transition-delay: 0.6s; }

        .mobile-nav-links a, .mobile-nav-links-vento a {
            text-decoration: none;
            color: #fff;
            font-size: 1.25rem;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .mobile-nav-links a i, .mobile-nav-links-vento a i {
            width: 35px;
            font-size: 1.4rem;
            color: var(--accent-cyan);
        }

        .mobile-nav-links a:hover, .mobile-nav-links-vento a:hover {
            color: var(--accent-cyan);
            padding-left: 20px;
            border-bottom-color: var(--accent-cyan);
        }

        .close-menu {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            border: none;
            color: var(--accent-cyan);
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-menu:hover {
            transform: rotate(90deg);
            color: #fff;
        }

        .main-container {
            flex: 1;
            padding: 140px 8% 100px;
            min-height: 100vh;
            transition: all 0.2s;
        }

        /* Card per i moduli */
        .module-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            position: relative;
        }
        .module-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.1);
            border-color: var(--accent-cyan);
        }
        .module-title {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            color: var(--accent-cyan);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .module-title i {
            font-size: 2rem;
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            width: 100px;
            margin: 1rem 0 1.5rem 0;
        }

        /* Stili per il calcolatore */
        .calculator-form {
            margin: 20px 0;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .input-field {
            flex: 1;
            min-width: 150px;
        }
        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-family: 'Orbitron', monospace;
            color: var(--accent-cyan);
            font-size: 0.9rem;
        }
        .input-field input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: 0.2s;
        }
        .input-field input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 8px rgba(0,229,255,0.3);
        }
        button.calcola {
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 1rem;
            color: #02050a;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        button.calcola:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px var(--accent-cyan);
        }
        .results {
            margin-top: 30px;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .result-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(0,229,255,0.2);
            transition: 0.2s;
            text-align: center;
        }
        .result-card:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 20, 30, 0.7);
        }
        .result-name {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            color: var(--accent-cyan);
            margin-bottom: 15px;
        }
        .detail-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }
        .error-message {
            background: rgba(255,0,0,0.2);
            border-left: 4px solid #ff4444;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            color: #ff8888;
        }
        .footer-credits {
            position: relative;
            width: 100%;
            padding: 20px 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(10px);
            z-index: 900;
            margin-top: auto;
        }
        .footer-credits p {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .footer-credits .developers {
            margin-top: 5px;
            font-size: 0.9rem;
            color: var(--accent-cyan);
            font-family: 'Orbitron', sans-serif;
        }
        .footer-credits .developers i {
            margin: 0 8px;
            color: #fff;
            font-size: 0.8rem;
        }
        .footer-credits .developers span {
            color: #fff;
            font-weight: 300;
        }
        @media (max-width: 768px) {
            .mobile-menu, .mobile-menu-vento { width: 100%; }
            .main-container { padding: 120px 5% 80px; }
            .module-title { font-size: 1.5rem; }
            .input-group { flex-direction: column; gap: 12px; }
            .result-name { font-size: 1.2rem; }
            .detail-value { font-size: 1.4rem; }
        }
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 4px; }
        .menu-overlay, .menu-overlay-vento {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1040;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .menu-overlay.active, .menu-overlay-vento.active {
            opacity: 1;
            visibility: visible;
        }
        .problem-detail-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 1rem;
            margin-top: 20px;
            border: 1px solid rgba(0,229,255,0.2);
        }
        .select-message {
            text-align: center;
            padding: 40px 20px;
            color: #888;
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
        }
        .select-message i {
            color: var(--accent-cyan);
            margin: 0 8px;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>

    <nav id="navbar">
        <div class="logo-text" id="logo-home">
            <i class="fas fa-compass-drafting"></i> NAV<span>TECH</span>
        </div>
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="menu-overlay-vento" id="menu-overlay-vento"></div>

    <!-- Menu principale -->
    <div class="mobile-menu" id="mobile-menu">
        <div class="menu-header"><i class="fas fa-compass"></i> NAVIGAZIONE</div>
        <button class="close-menu" id="close-menu"><i class="fas fa-times"></i></button>
        <ul class="mobile-nav-links">
            <li><a href="#" data-page="vento"><i class="fas fa-wind"></i> Problema del Vento</a></li>
            <li><a href="#" data-page="lossodromia"><i class="fas fa-route"></i> Lossodromia</a></li>
            <li><a href="#" data-page="ortodromia"><i class="fas fa-earth-americas"></i> Ortodromia</a></li>
            <li><a href="#" data-page="pnr"><i class="fas fa-map-location-dot"></i> PNR</a></li>
            <li><a href="#" data-page="per"><i class="fas fa-clock-rotate-left"></i> PET</a></li>
            <li><a href="#" data-page="intercettamento"><i class="fas fa-crosshairs"></i> Intercettamento</a></li>
        </ul>
    </div>

    <!-- Menu contestuale vento -->
    <div class="mobile-menu-vento" id="mobile-menu-vento">
        <div class="menu-header"><i class="fas fa-wind"></i> PROBLEMI DEL VENTO</div>
        <button class="close-menu" id="close-menu-vento"><i class="fas fa-times"></i></button>
        <ul class="mobile-nav-links-vento">
            <li><a href="#" data-subproblem="primo"><i class="fas fa-1"></i> Primo Problema</a></li>
            <li><a href="#" data-subproblem="secondo"><i class="fas fa-2"></i> Secondo Problema</a></li>
            <li><a href="#" data-subproblem="terzo"><i class="fas fa-3"></i> Terzo Problema</a></li>
            <li><a href="#" data-subproblem="quarto"><i class="fas fa-4"></i> Quarto Problema</a></li>
        </ul>
    </div>

    <main class="main-container" id="main-container">
        <!-- Contenuto dinamico -->
    </main>

    <footer class="footer-credits reveal">
        <p>Sistema di Navigazione Avanzata</p>
        <div class="developers">
            <span>Sviluppato da</span>
            <i class="fas fa-code"></i>
            <strong>Alessio Lucchini</strong>
            <i class="fas fa-plus"></i>
            <strong>Andrea Squizzato</strong>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        // ---------- GESTIONE MENU ----------
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const closeMenuBtn = document.getElementById('close-menu');
        const mobileMenuVento = document.getElementById('mobile-menu-vento');
        const menuOverlayVento = document.getElementById('menu-overlay-vento');
        const closeMenuVentoBtn = document.getElementById('close-menu-vento');

        let currentModule = 'home';

        function openMainMenu() {
            mobileMenu.classList.add('active');
            menuOverlay.classList.add('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(-45deg) translate(-6px, 7px)';
            bars[1].style.opacity = '0';
            bars[2].style.transform = 'rotate(45deg) translate(-6px, -7px)';
        }
        function closeMainMenu() {
            mobileMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(0) translate(0, 0)';
            bars[1].style.opacity = '1';
            bars[2].style.transform = 'rotate(0) translate(0, 0)';
        }
        function openVentoMenu() {
            mobileMenuVento.classList.add('active');
            menuOverlayVento.classList.add('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(-45deg) translate(-6px, 7px)';
            bars[1].style.opacity = '0';
            bars[2].style.transform = 'rotate(45deg) translate(-6px, -7px)';
        }
        function closeVentoMenu() {
            mobileMenuVento.classList.remove('active');
            menuOverlayVento.classList.remove('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(0) translate(0, 0)';
            bars[1].style.opacity = '1';
            bars[2].style.transform = 'rotate(0) translate(0, 0)';
        }

        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentModule === 'vento') {
                if (mobileMenuVento.classList.contains('active')) closeVentoMenu();
                else openVentoMenu();
            } else {
                if (mobileMenu.classList.contains('active')) closeMainMenu();
                else openMainMenu();
            }
        });
        closeMenuBtn.addEventListener('click', closeMainMenu);
        menuOverlay.addEventListener('click', closeMainMenu);
        closeMenuVentoBtn.addEventListener('click', closeVentoMenu);
        menuOverlayVento.addEventListener('click', closeVentoMenu);

        // ---------- CONTENUTI MODULI ----------
        function getModuleHTML(moduleId) {
            if (moduleId === 'home') return `<div class="reveal active" style="min-height: 0;"></div>`;
            if (moduleId === 'vento') {
                return `
                    <div class="reveal active">
                        <div class="module-card" id="vento-module-card">
                            <div class="module-title"><i class="fas fa-wind"></i> Problema del Vento</div>
                            <div class="divider"></div>
                            <div id="problemDetailContainer" class="problem-detail-box">
                                <div class="select-message">
                                    <i class="fas fa-arrow-right"></i> Seleziona un problema dal menu <i class="fas fa-bars"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            if (moduleId === 'lossodromia') {
                return `<div class="reveal active"><div class="module-card"><div class="module-title"><i class="fas fa-route"></i> Lossodromia</div><div class="divider"></div></div></div>`;
            }
            if (moduleId === 'ortodromia') {
                return `<div class="reveal active"><div class="module-card"><div class="module-title"><i class="fas fa-earth-americas"></i> Ortodromia</div><div class="divider"></div></div></div>`;
            }
            if (moduleId === 'pnr') {
                return `<div class="reveal active"><div class="module-card"><div class="module-title"><i class="fas fa-map-location-dot"></i> PNR</div><div class="divider"></div></div></div>`;
            }
            if (moduleId === 'per') {
                return `<div class="reveal active"><div class="module-card"><div class="module-title"><i class="fas fa-clock-rotate-left"></i> PET</div><div class="divider"></div></div></div>`;
            }
            if (moduleId === 'intercettamento') {
                return `<div class="reveal active"><div class="module-card"><div class="module-title"><i class="fas fa-crosshairs"></i> Intercettamento</div><div class="divider"></div></div></div>`;
            }
            return `<div class="reveal active" style="min-height: 0;"></div>`;
        }

        // ---------- PRIMO PROBLEMA ----------
        function showPrimoProblema() {
            const container = document.getElementById('problemDetailContainer');
            if (!container) return;
            container.innerHTML = `
                <div class="calculator-form">
                    <div class="input-group">
                        <div class="input-field">
                            <label>TC (Rotta Vera) <i class="fas fa-arrow-right"></i></label>
                            <input type="number" id="tc" step="any" placeholder="">
                        </div>
                        <div class="input-field">
                            <label>TAS (Velocità propria) <i class="fas fa-gauge-high"></i></label>
                            <input type="number" id="tas" step="any" placeholder="">
                        </div>
                        <div class="input-field">
                            <label>W (Direzione del vento) <i class="fas fa-wind"></i></label>
                            <input type="number" id="w" step="any" placeholder="">
                        </div>
                        <div class="input-field">
                            <label>V (Velocità del vento) <i class="fas fa-gauge-high"></i></label>
                            <input type="number" id="v" step="any" placeholder="">
                        </div>
                    </div>
                    <button class="calcola" id="calcolaPrimo">CALCOLA</button>
                    <div id="risultatiPrimo"></div>
                </div>
            `;
            const calcolaBtn = document.getElementById('calcolaPrimo');
            calcolaBtn.addEventListener('click', () => {
                const tc = parseFloat(document.getElementById('tc').value);
                const tas = parseFloat(document.getElementById('tas').value);
                const w = parseFloat(document.getElementById('w').value);
                const v = parseFloat(document.getElementById('v').value);
                if (isNaN(tc) || isNaN(tas) || isNaN(w) || isNaN(v)) {
                    document.getElementById('risultatiPrimo').innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori numerici.</div>`;
                    return;
                }
                const diff_deg = w - tc;
                const diff_rad = diff_deg * Math.PI / 180;
                const xc = v * Math.sin(diff_rad);
                const lc = -v * Math.cos(diff_rad);
                const rapporto = xc / tas;
                if (Math.abs(rapporto) > 1) {
                    document.getElementById('risultatiPrimo').innerHTML = `<div class="error-message">⚠️ VENTO TROPPO FORTE! Il rapporto xc/TAS supera 1.</div>`;
                    return;
                }
                const wca_rad = Math.asin(rapporto);
                const wca = wca_rad * 180 / Math.PI;
                const etas = tas * Math.cos(wca_rad);
                let th = tc + wca;
                th = ((th % 360) + 360) % 360;
                const gs = etas + lc;
                const round3 = (n) => n.toFixed(3);
                const risultatiHtml = `
                    <div class="results">
                        <div class="results-grid">
                            <div class="result-card">
                                <div class="result-name">TH</div>
                                <div class="detail-value">${round3(th)}°</div>
                            </div>
                            <div class="result-card">
                                <div class="result-name">GS</div>
                                <div class="detail-value">${round3(gs)}</div>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('risultatiPrimo').innerHTML = risultatiHtml;
            });
        }

        // ---------- SECONDO PROBLEMA ----------
        function showSecondoProblema() {
            const container = document.getElementById('problemDetailContainer');
            if (!container) return;
            container.innerHTML = `
                <div class="calculator-form">
                    <div class="input-group">
                        <div class="input-field"><label>TH (Rotta vera)</label><input type="number" id="th2" step="any" placeholder=""></div>
                        <div class="input-field"><label>TAS (Velocità propria)</label><input type="number" id="tas2" step="any" placeholder=""></div>
                        <div class="input-field"><label>W (Direzione del vento)</label><input type="number" id="w2" step="any" placeholder=""></div>
                        <div class="input-field"><label>V (Velocità del vento)</label><input type="number" id="v2" step="any" placeholder=""></div>
                    </div>
                    <button class="calcola" id="calcolaSecondo">CALCOLA</button>
                    <div id="risultatiSecondo"></div>
                </div>
            `;
            const calcolaBtn = document.getElementById('calcolaSecondo');
            calcolaBtn.addEventListener('click', () => {
                const th = parseFloat(document.getElementById('th2').value);
                const tas = parseFloat(document.getElementById('tas2').value);
                const wd = parseFloat(document.getElementById('w2').value);
                const wv = parseFloat(document.getElementById('v2').value);
                if (isNaN(th) || isNaN(tas) || isNaN(wd) || isNaN(wv)) {
                    document.getElementById('risultatiSecondo').innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori numerici.</div>`;
                    return;
                }
                const round3 = (n) => n.toFixed(3);
                let tcp_prev = th;
                let finalTcp = tcp_prev;
                let finalWca = 0;
                for (let i = 1; i <= 5; i++) {
                    const alfa_rad = (wd - tcp_prev) * Math.PI / 180;
                    const xc = wv * Math.sin(alfa_rad);
                    let ratio = xc / tas;
                    if (ratio > 1) ratio = 1;
                    if (ratio < -1) ratio = -1;
                    const wca_rad = Math.asin(ratio);
                    const wca = wca_rad * 180 / Math.PI;
                    const tcp_curr = th - wca;
                    finalTcp = tcp_curr;
                    finalWca = wca;
                    if (Math.abs(tcp_curr - tcp_prev) < 0.001) break;
                    tcp_prev = tcp_curr;
                }
                const ang_lc_rad = (wd - finalTcp) * Math.PI / 180;
                const lc = -wv * Math.cos(ang_lc_rad);
                const etas = tas * Math.cos(finalWca * Math.PI / 180);
                const gs = etas + lc;
                document.getElementById('risultatiSecondo').innerHTML = `
                    <div class="results"><div class="results-grid">
                        <div class="result-card"><div class="result-name">TC</div><div class="detail-value">${round3(finalTcp)}°</div></div>
                        <div class="result-card"><div class="result-name">GS</div><div class="detail-value">${round3(gs)}</div></div>
                    </div></div>
                `;
            });
        }

        // ---------- TERZO PROBLEMA ----------
        function showTerzoProblema() {
            const container = document.getElementById('problemDetailContainer');
            if (!container) return;
            container.innerHTML = `
                <div class="calculator-form">
                    <div class="input-group">
                        <div class="input-field"><label>TH (Rotta vera)</label><input type="number" id="th3" step="any" placeholder=""></div>
                        <div class="input-field"><label>TC (Traccia)</label><input type="number" id="tc3" step="any" placeholder=""></div>
                        <div class="input-field"><label>GS (Velocità al suolo)</label><input type="number" id="gs3" step="any" placeholder=""></div>
                        <div class="input-field"><label>TAS (Velocità propria)</label><input type="number" id="tas3" step="any" placeholder=""></div>
                    </div>
                    <button class="calcola" id="calcolaTerzo">CALCOLA</button>
                    <div id="risultatiTerzo"></div>
                </div>
            `;
            const calcolaBtn = document.getElementById('calcolaTerzo');
            calcolaBtn.addEventListener('click', () => {
                const th = parseFloat(document.getElementById('th3').value);
                const tc = parseFloat(document.getElementById('tc3').value);
                const gs = parseFloat(document.getElementById('gs3').value);
                const tas = parseFloat(document.getElementById('tas3').value);
                if (isNaN(th) || isNaN(tc) || isNaN(gs) || isNaN(tas)) {
                    document.getElementById('risultatiTerzo').innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori numerici.</div>`;
                    return;
                }
                const wca = th - tc;
                const wca_rad = wca * Math.PI / 180;
                const xc = tas * Math.sin(wca_rad);
                const etas = tas * Math.cos(wca_rad);
                const lc = gs - etas;
                const v = Math.sqrt(xc * xc + lc * lc);
                let w;
                if (Math.abs(v) < 1e-6) w = 0;
                else {
                    const segno = xc > 0 ? -1 : 1;
                    const asin_val = Math.asin(lc / v) * 180 / Math.PI;
                    const angolo_interno = 90 - asin_val;
                    let w_parziale = tc + (segno * angolo_interno);
                    w = w_parziale < 180 ? w_parziale + 180 : w_parziale - 180;
                    w = ((w % 360) + 360) % 360;
                }
                const round3 = (n) => n.toFixed(3);
                document.getElementById('risultatiTerzo').innerHTML = `
                    <div class="results"><div class="results-grid">
                        <div class="result-card"><div class="result-name">W</div><div class="detail-value">${round3(w)}°</div></div>
                        <div class="result-card"><div class="result-name">V</div><div class="detail-value">${round3(v)}</div></div>
                    </div></div>
                `;
            });
        }

        // ---------- QUARTO PROBLEMA ----------
        function showQuartoProblema() {
            const container = document.getElementById('problemDetailContainer');
            if (!container) return;
            container.innerHTML = `
                <div class="calculator-form">
                    <div class="input-group">
                        <div class="input-field"><label>TC (Traccia)</label><input type="number" id="tc4" step="any" placeholder=""></div>
                        <div class="input-field"><label>GS (Velocità al suolo)</label><input type="number" id="gs4" step="any" placeholder=""></div>
                        <div class="input-field"><label>W (Direzione del vento)</label><input type="number" id="w4" step="any" placeholder=""></div>
                        <div class="input-field"><label>V (Velocità del vento)</label><input type="number" id="v4" step="any" placeholder=""></div>
                    </div>
                    <button class="calcola" id="calcolaQuarto">CALCOLA</button>
                    <div id="risultatiQuarto"></div>
                </div>
            `;
            const calcolaBtn = document.getElementById('calcolaQuarto');
            calcolaBtn.addEventListener('click', () => {
                const tc = parseFloat(document.getElementById('tc4').value);
                const gs = parseFloat(document.getElementById('gs4').value);
                const w = parseFloat(document.getElementById('w4').value);
                const v = parseFloat(document.getElementById('v4').value);
                if (isNaN(tc) || isNaN(gs) || isNaN(w) || isNaN(v)) {
                    document.getElementById('risultatiQuarto').innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori numerici.</div>`;
                    return;
                }
                const diff_rad = (w - tc) * Math.PI / 180;
                const xc = v * Math.sin(diff_rad);
                const lc = -v * Math.cos(diff_rad);
                const etas = gs - lc;
                if (Math.abs(etas) < 1e-6) {
                    document.getElementById('risultatiQuarto').innerHTML = `<div class="error-message">⚠️ Errore: ETAS prossimo a zero.</div>`;
                    return;
                }
                const wca_rad = Math.atan(xc / etas);
                const wca = wca_rad * 180 / Math.PI;
                let th = tc + wca;
                th = ((th % 360) + 360) % 360;
                const tas = etas / Math.cos(wca_rad);
                const round3 = (n) => n.toFixed(3);
                document.getElementById('risultatiQuarto').innerHTML = `
                    <div class="results"><div class="results-grid">
                        <div class="result-card"><div class="result-name">TH</div><div class="detail-value">${round3(th)}°</div></div>
                        <div class="result-card"><div class="result-name">TAS</div><div class="detail-value">${round3(tas)}</div></div>
                    </div></div>
                `;
            });
        }

        // ---------- RESET VIEW ----------
        function showSelectMessage() {
            const container = document.getElementById('problemDetailContainer');
            if (container) {
                container.innerHTML = `
                    <div class="select-message">
                        <i class="fas fa-arrow-right"></i> Seleziona un problema dal menu <i class="fas fa-bars"></i>
                    </div>
                `;
            }
        }

        // Gestione click sottomenu vento
        function setupVentoSubmenu() {
            const submenuLinks = document.querySelectorAll('.mobile-nav-links-vento a');
            submenuLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const problem = link.getAttribute('data-subproblem');
                    if (problem === 'primo') showPrimoProblema();
                    else if (problem === 'secondo') showSecondoProblema();
                    else if (problem === 'terzo') showTerzoProblema();
                    else if (problem === 'quarto') showQuartoProblema();
                    closeVentoMenu();
                });
            });
        }

        // Navigazione principale
        function navigateTo(moduleId, addToHistory = true) {
            currentModule = moduleId;
            const container = document.getElementById('main-container');
            if (!container) return;
            container.innerHTML = getModuleHTML(moduleId);
            
            if (moduleId === 'vento') {
                closeMainMenu();
                mobileMenuVento.style.display = 'block';
                mobileMenu.style.display = 'none';
                setTimeout(() => {
                    showSelectMessage();
                    setupVentoSubmenu();
                }, 20);
            } else {
                closeVentoMenu();
                mobileMenuVento.style.display = 'none';
                mobileMenu.style.display = 'block';
            }
            
            const reveals = container.querySelectorAll('.reveal');
            reveals.forEach(el => el.classList.add('active'));
            
            const titles = {
                home: 'NavTech | Navigazione',
                vento: 'Problema del Vento - NavTech',
                lossodromia: 'Lossodromia - NavTech',
                ortodromia: 'Ortodromia - NavTech',
                pnr: 'PNR - NavTech',
                per: 'PET - NavTech',
                intercettamento: 'Intercettamento - NavTech'
            };
            document.title = titles[moduleId] || 'NavTech Pro';
            
            if (addToHistory) {
                const state = { module: moduleId };
                const url = new URL(window.location);
                url.searchParams.set('nav', moduleId);
                window.history.pushState(state, '', url);
            }
        }
        
        // Eventi per il menu principale
        document.querySelectorAll('.mobile-nav-links a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const pageKey = link.getAttribute('data-page');
                if (pageKey) {
                    navigateTo(pageKey, true);
                    closeMainMenu();
                }
            });
        });
        
        // Logo -> home
        const logoHome = document.getElementById('logo-home');
        if (logoHome) {
            logoHome.addEventListener('click', () => {
                navigateTo('home', true);
                closeMainMenu();
                closeVentoMenu();
            });
        }
        
        // Popstate
        window.addEventListener('popstate', (event) => {
            let moduleId = 'home';
            if (event.state && event.state.module) moduleId = event.state.module;
            else {
                const params = new URLSearchParams(window.location.search);
                moduleId = params.get('nav') || 'home';
            }
            navigateTo(moduleId, false);
        });
        
        // Particelle
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.5 + 0.2
                });
            }
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 229, 255, ${p.alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', () => { initParticles(); });
        initParticles();
        drawParticles();
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => entry.isIntersecting && entry.target.classList.add('active'));
        }, { threshold: 0.15 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        
        // Avvio
        mobileMenuVento.style.display = 'none';
        mobileMenu.style.display = 'block';
        const initialParam = new URLSearchParams(window.location.search).get('nav');
        if (initialParam && ['vento','lossodromia','ortodromia','pnr','per','intercettamento'].includes(initialParam)) {
            navigateTo(initialParam, false);
            const state = { module: initialParam };
            window.history.replaceState(state, '', window.location.href);
        } else {
            navigateTo('home', false);
            window.history.replaceState({ module: 'home' }, '', window.location.pathname);
        }
    </script>
</body>
