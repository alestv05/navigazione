<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NavTech Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 229, 255, 0.2);
            --card-bg: rgba(10, 20, 30, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Sfondo Animato */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-text:hover { text-shadow: 0 0 15px var(--accent-cyan); }
        .logo-text span { color: var(--accent-cyan); }
        .logo-text i { color: var(--accent-cyan); }

        /* Hamburger */
        .hamburger {
            cursor: pointer;
            z-index: 1100;
            background: none;
            border: none;
            padding: 10px;
        }

        .bar {
            display: block;
            width: 35px;
            height: 2px;
            margin: 8px auto;
            background-color: var(--accent-cyan);
            transition: 0.4s;
            box-shadow: 0 0 5px var(--accent-cyan);
        }

        /* Menu Laterale */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            height: 100vh;
            background: rgba(2, 5, 10, 0.98);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--accent-cyan);
            z-index: 1050;
            transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1);
            padding: 120px 40px;
            display: flex;
            flex-direction: column;
        }

        .mobile-menu.active { right: 0; }

        .menu-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--accent-cyan);
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            letter-spacing: 2px;
        }

        .mobile-nav-links {
            list-style: none;
        }

        .mobile-nav-links li {
            margin-bottom: 10px;
            opacity: 0;
            transform: translateX(30px);
            transition: 0.4s;
        }

        .mobile-menu.active .mobile-nav-links li {
            opacity: 1;
            transform: translateX(0);
        }

        .mobile-nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 0;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .mobile-nav-links a:hover {
            color: var(--accent-cyan);
            padding-left: 10px;
        }

        .mobile-nav-links a i {
            width: 25px;
            text-align: center;
            color: var(--accent-cyan);
        }

        .close-menu {
            position: absolute;
            top: 30px;
            right: 30px;
            background: none;
            border: none;
            color: var(--accent-cyan);
            font-size: 2rem;
            cursor: pointer;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1040;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
        }
        .menu-overlay.active { opacity: 1; visibility: visible; }

        /* Main Content */
        .main-container {
            flex: 1;
            padding: 100px 8%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .module-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid var(--border);
            padding: 80px 40px;
            width: 100%;
            max-width: 1000px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.1);
            animation: fadeIn 1s ease;
        }

        .module-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--accent-cyan);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .title-divider {
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            width: 50%;
            margin: 0 auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        .footer {
            padding: 30px;
            text-align: center;
            border-top: 1px solid var(--border);
            background: rgba(2, 5, 10, 0.9);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .footer strong { color: var(--accent-cyan); }

        @media (max-width: 768px) {
            .mobile-menu { width: 100%; }
            .module-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>

    <nav>
        <div class="logo-text" id="btn-home">
            <i class="fas fa-compass-drafting"></i> NAV<span>TECH</span>
        </div>
        <div class="hamburger" id="hamburger-btn">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <div class="menu-overlay" id="overlay"></div>

    <div class="mobile-menu" id="side-menu">
        <button class="close-menu" id="btn-close"><i class="fas fa-times"></i></button>
        <div class="menu-header" id="menu-label">NAVIGAZIONE</div>
        <ul class="mobile-nav-links" id="menu-list">
            </ul>
    </div>

    <main class="main-container" id="content-area">
        </main>

    <footer class="footer">
        SVILUPPATO DA <strong>ALESSIO LUCCHINI</strong> & <strong>ANDREA SQUIZZATO</strong>
    </footer>

    <script>
        const contentArea = document.getElementById('content-area');
        const menuList = document.getElementById('menu-list');
        const menuLabel = document.getElementById('menu-label');
        const sideMenu = document.getElementById('side-menu');
        const overlay = document.getElementById('overlay');

        // Configurazione Voci Menu
        const mainMenu = [
            { id: 'vento', text: 'Problema del Vento', icon: 'fa-wind' },
            { id: 'lossodromia', text: 'Lossodromia', icon: 'fa-route' },
            { id: 'ortodromia', text: 'Ortodromia', icon: 'fa-earth-americas' },
            { id: 'intercettamento', text: 'Intercettamento', icon: 'fa-crosshairs' },
            { id: 'pnr', text: 'PNR', icon: 'fa-map-location-dot' },
            { id: 'pet', text: 'PET', icon: 'fa-clock-rotate-left' }
        ];

        const windMenu = [
            { id: 'v1', text: '1° Problema del Vento', icon: 'fa-circle-1' },
            { id: 'v2', text: '2° Problema del Vento', icon: 'fa-circle-2' },
            { id: 'v3', text: '3° Problema del Vento', icon: 'fa-circle-3' },
            { id: 'v4', text: '4° Problema del Vento', icon: 'fa-circle-4' }
        ];

        // Funzione per generare il menu
        function renderMenu(items, label) {
            menuLabel.innerText = label;
            menuList.innerHTML = '';
            items.forEach((item, index) => {
                const li = document.createElement('li');
                li.style.transitionDelay = `${0.1 * index}s`;
                li.innerHTML = `<a href="#" data-id="${item.id}"><i class="fas ${item.icon}"></i> ${item.text}</a>`;
                li.onclick = (e) => {
                    e.preventDefault();
                    handleNavigation(item.id, item.text);
                };
                menuList.appendChild(li);
            });
        }

        // Gestione Navigazione
        function handleNavigation(id, title) {
            closeMenu();
            
            // Se clicco su "Problema del Vento" dal menu principale
            if (id === 'vento') {
                renderMenu(windMenu, 'PROBLEMI VENTO');
                showScreen(title);
            } 
            // Se clicco su uno dei 4 problemi del vento
            else if (id.startsWith('v')) {
                showScreen(title);
            }
            // Altre sezioni
            else {
                showScreen(title);
            }
        }

        function showScreen(title) {
            contentArea.innerHTML = `
                <div class="module-card">
                    <h1 class="module-title">${title}</h1>
                    <div class="title-divider"></div>
                </div>
            `;
            document.title = "NavTech | " + title;
        }

        function goHome() {
            contentArea.innerHTML = ''; // Pulito
            renderMenu(mainMenu, 'NAVIGAZIONE');
            document.title = "NavTech Professional";
            closeMenu();
        }

        // UI Controls
        function openMenu() {
            sideMenu.classList.add('active');
            overlay.classList.add('active');
        }

        function closeMenu() {
            sideMenu.classList.remove('active');
            overlay.classList.remove('active');
        }

        document.getElementById('hamburger-btn').onclick = openMenu;
        document.getElementById('btn-close').onclick = closeMenu;
        overlay.onclick = closeMenu;
        document.getElementById('btn-home').onclick = goHome;

        // Particle System
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5
                });
            }
        }

        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                if(p.x > canvas.width) p.x = 0;
                if(p.x < 0) p.x = canvas.width;
                if(p.y > canvas.height) p.y = 0;
                if(p.y < 0) p.y = canvas.height;
                
                ctx.fillStyle = 'rgba(0, 229, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.onresize = initParticles;
        initParticles();
        animate();

        // Start
        goHome();
    </script>
</body>
</html>
