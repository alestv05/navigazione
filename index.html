<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NavTech | Navigazione Professionale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(10, 20, 30, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.35;
            z-index: -1;
            pointer-events: none;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
        }
        .logo-text:hover {
            text-shadow: 0 0 8px var(--accent-cyan);
        }

        .logo-text span {
            color: var(--accent-cyan);
        }

        .logo-text i {
            margin-right: 8px;
            color: var(--accent-cyan);
        }

        .hamburger {
            display: block;
            cursor: pointer;
            z-index: 1100;
            background: transparent;
            border: none;
            padding: 10px;
        }

        .bar {
            display: block;
            width: 30px;
            height: 3px;
            margin: 6px auto;
            background-color: var(--accent-cyan);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        /* Menu principale e contestuale */
        .mobile-menu, .mobile-menu-vento {
            position: fixed;
            top: 0;
            right: -100%;
            width: 380px;
            height: 100vh;
            background: rgba(2, 5, 10, 0.98);
            backdrop-filter: blur(25px);
            border-left: 2px solid var(--accent-cyan);
            z-index: 1050;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding-top: 100px;
            box-shadow: -10px 0 50px rgba(0, 229, 255, 0.2);
        }

        .mobile-menu.active, .mobile-menu-vento.active {
            right: 0;
        }

        .menu-header {
            position: absolute;
            top: 25px;
            left: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--accent-cyan);
            padding-bottom: 8px;
        }

        .menu-header i {
            margin-right: 8px;
        }

        .mobile-nav-links, .mobile-nav-links-vento {
            list-style: none;
            padding: 0 30px;
        }

        .mobile-nav-links li, .mobile-nav-links-vento li {
            margin: 0;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.4s ease;
        }

        .mobile-menu.active .mobile-nav-links li,
        .mobile-menu-vento.active .mobile-nav-links-vento li {
            opacity: 1;
            transform: translateX(0);
        }

        .mobile-menu.active .mobile-nav-links li:nth-child(1),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(1) { transition-delay: 0.1s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(2),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(2) { transition-delay: 0.2s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(3),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(3) { transition-delay: 0.3s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(4),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(4) { transition-delay: 0.4s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(5),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(5) { transition-delay: 0.5s; }
        .mobile-menu.active .mobile-nav-links li:nth-child(6),
        .mobile-menu-vento.active .mobile-nav-links-vento li:nth-child(6) { transition-delay: 0.6s; }

        .mobile-nav-links a, .mobile-nav-links-vento a {
            text-decoration: none;
            color: #fff;
            font-size: 1.25rem;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .mobile-nav-links a i, .mobile-nav-links-vento a i {
            width: 35px;
            font-size: 1.4rem;
            color: var(--accent-cyan);
        }

        .mobile-nav-links a:hover, .mobile-nav-links-vento a:hover {
            color: var(--accent-cyan);
            padding-left: 20px;
            border-bottom-color: var(--accent-cyan);
        }

        .close-menu {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            border: none;
            color: var(--accent-cyan);
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-menu:hover {
            transform: rotate(90deg);
            color: #fff;
        }

        .main-container {
            flex: 1;
            padding: 140px 8% 100px;
            min-height: 100vh;
            transition: all 0.2s;
        }

        /* Card per i moduli */
        .module-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            position: relative;
        }
        .module-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.1);
            border-color: var(--accent-cyan);
        }
        .module-title {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            color: var(--accent-cyan);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .module-title i {
            font-size: 2rem;
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            width: 100px;
            margin: 1rem 0 1.5rem 0;
        }

        /* Stili per i problemi del vento (quattro card) */
        .problems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }
        .problem-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            border: 1px solid rgba(0,229,255,0.3);
            padding: 1.5rem;
            transition: all 0.2s;
        }
        .problem-card:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 5px 20px rgba(0,229,255,0.1);
        }
        .problem-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            color: var(--accent-cyan);
            border-left: 4px solid var(--accent-cyan);
            padding-left: 12px;
            margin-bottom: 0.5rem;
        }
        .problem-info {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 1rem;
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 16px;
            display: inline-block;
        }
        .problem-info i {
            margin-right: 5px;
            color: var(--accent-cyan);
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .input-field {
            flex: 1;
            min-width: 120px;
        }
        .input-field label {
            display: block;
            margin-bottom: 6px;
            font-family: 'Orbitron', monospace;
            color: var(--accent-cyan);
            font-size: 0.8rem;
        }
        .input-field input {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .input-field input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 6px rgba(0,229,255,0.3);
        }
        button.calcola-problema {
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 0.9rem;
            color: #02050a;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 5px;
        }
        button.calcola-problema:hover {
            transform: scale(1.02);
            box-shadow: 0 0 10px var(--accent-cyan);
        }
        .results-area {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 12px;
            font-size: 0.85rem;
            border: 1px dashed rgba(0,229,255,0.3);
            overflow-x: auto;
        }
        .result-detail {
            margin: 8px 0;
            font-family: monospace;
        }
        .result-name {
            color: var(--accent-cyan);
            font-weight: bold;
        }
        .formula-step {
            font-size: 0.75rem;
            color: #aaa;
            margin-left: 10px;
        }
        .error-message {
            background: rgba(255,0,0,0.2);
            border-left: 4px solid #ff4444;
            padding: 10px;
            border-radius: 12px;
            margin-top: 12px;
            color: #ff8888;
        }
        .iteration-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .footer-credits {
            position: relative;
            width: 100%;
            padding: 20px 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(10px);
            z-index: 900;
            margin-top: auto;
        }
        .footer-credits p {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .footer-credits .developers {
            margin-top: 5px;
            font-size: 0.9rem;
            color: var(--accent-cyan);
            font-family: 'Orbitron', sans-serif;
        }
        .footer-credits .developers i {
            margin: 0 8px;
            color: #fff;
            font-size: 0.8rem;
        }
        .footer-credits .developers span {
            color: #fff;
            font-weight: 300;
        }
        @media (max-width: 768px) {
            .mobile-menu, .mobile-menu-vento { width: 100%; }
            .main-container { padding: 120px 5% 80px; }
            .module-title { font-size: 1.5rem; }
            .problems-grid { grid-template-columns: 1fr; }
            .input-group { flex-direction: column; gap: 10px; }
        }
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 4px; }
        .menu-overlay, .menu-overlay-vento {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1040;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .menu-overlay.active, .menu-overlay-vento.active {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>

    <nav id="navbar">
        <div class="logo-text" id="logo-home">
            <i class="fas fa-compass-drafting"></i> NAV<span>TECH</span>
        </div>
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="menu-overlay-vento" id="menu-overlay-vento"></div>

    <!-- Menu principale -->
    <div class="mobile-menu" id="mobile-menu">
        <div class="menu-header"><i class="fas fa-compass"></i> NAVIGAZIONE</div>
        <button class="close-menu" id="close-menu"><i class="fas fa-times"></i></button>
        <ul class="mobile-nav-links">
            <li><a href="#" data-page="vento"><i class="fas fa-wind"></i> Problema del Vento</a></li>
            <li><a href="#" data-page="lossodromia"><i class="fas fa-route"></i> Lossodromia</a></li>
            <li><a href="#" data-page="ortodromia"><i class="fas fa-earth-americas"></i> Ortodromia</a></li>
            <li><a href="#" data-page="pnr"><i class="fas fa-map-location-dot"></i> PNR</a></li>
            <li><a href="#" data-page="per"><i class="fas fa-clock-rotate-left"></i> PET</a></li>
            <li><a href="#" data-page="intercettamento"><i class="fas fa-crosshairs"></i> Intercettamento</a></li>
        </ul>
    </div>

    <!-- Menu contestuale vento (opzionale, mantenuto per coerenza ma non più usato per selezione diretta) -->
    <div class="mobile-menu-vento" id="mobile-menu-vento">
        <div class="menu-header"><i class="fas fa-wind"></i> PROBLEMI DEL VENTO</div>
        <button class="close-menu" id="close-menu-vento"><i class="fas fa-times"></i></button>
        <ul class="mobile-nav-links-vento">
            <li><a href="#" data-subproblem="primo"><i class="fas fa-1"></i> Primo Problema</a></li>
            <li><a href="#" data-subproblem="secondo"><i class="fas fa-2"></i> Secondo Problema</a></li>
            <li><a href="#" data-subproblem="terzo"><i class="fas fa-3"></i> Terzo Problema</a></li>
            <li><a href="#" data-subproblem="quarto"><i class="fas fa-4"></i> Quarto Problema</a></li>
        </ul>
    </div>

    <main class="main-container" id="main-container">
        <!-- Contenuto dinamico -->
    </main>

    <footer class="footer-credits reveal">
        <p>Sistema di Navigazione Avanzata</p>
        <div class="developers">
            <span>Sviluppato da</span>
            <i class="fas fa-code"></i>
            <strong>Alessio Lucchini</strong>
            <i class="fas fa-plus"></i>
            <strong>Andrea Squizzato</strong>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        // ---------- GESTIONE MENU ----------
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const closeMenuBtn = document.getElementById('close-menu');
        const mobileMenuVento = document.getElementById('mobile-menu-vento');
        const menuOverlayVento = document.getElementById('menu-overlay-vento');
        const closeMenuVentoBtn = document.getElementById('close-menu-vento');

        let currentModule = 'home';

        function openMainMenu() {
            mobileMenu.classList.add('active');
            menuOverlay.classList.add('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(-45deg) translate(-6px, 7px)';
            bars[1].style.opacity = '0';
            bars[2].style.transform = 'rotate(45deg) translate(-6px, -7px)';
        }
        function closeMainMenu() {
            mobileMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(0) translate(0, 0)';
            bars[1].style.opacity = '1';
            bars[2].style.transform = 'rotate(0) translate(0, 0)';
        }
        function openVentoMenu() {
            mobileMenuVento.classList.add('active');
            menuOverlayVento.classList.add('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(-45deg) translate(-6px, 7px)';
            bars[1].style.opacity = '0';
            bars[2].style.transform = 'rotate(45deg) translate(-6px, -7px)';
        }
        function closeVentoMenu() {
            mobileMenuVento.classList.remove('active');
            menuOverlayVento.classList.remove('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(0) translate(0, 0)';
            bars[1].style.opacity = '1';
            bars[2].style.transform = 'rotate(0) translate(0, 0)';
        }

        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentModule === 'vento') {
                if (mobileMenuVento.classList.contains('active')) closeVentoMenu();
                else openVentoMenu();
            } else {
                if (mobileMenu.classList.contains('active')) closeMainMenu();
                else openMainMenu();
            }
        });
        closeMenuBtn.addEventListener('click', closeMainMenu);
        menuOverlay.addEventListener('click', closeMainMenu);
        closeMenuVentoBtn.addEventListener('click', closeVentoMenu);
        menuOverlayVento.addEventListener('click', closeVentoMenu);

        // ---------- CONTENUTI MODULI ----------
        // La pagina del vento ora contiene direttamente i 4 problemi con input e risultati
        function getModuleHTML(moduleId) {
            if (moduleId === 'home') return `<div class="reveal active" style="min-height: 0;"><div class="module-card"><div class="module-title"><i class="fas fa-home"></i> Benvenuto in NavTech</div><div class="divider"></div><p style="color:#ccc">Seleziona una funzionalità dal menu per iniziare.</p></div></div>`;
            if (moduleId === 'vento') {
                return `
                    <div class="reveal active">
                        <div class="module-card">
                            <div class="module-title"><i class="fas fa-wind"></i> Problema del Vento</div>
                            <div class="divider"></div>
                            <div class="problems-grid">
                                <!-- PRIMO PROBLEMA -->
                                <div class="problem-card">
                                    <div class="problem-title"><i class="fas fa-1"></i> Primo Problema</div>
                                    <div class="problem-info"><i class="fas fa-database"></i> Dati: TC, TAS, W/V &nbsp;|&nbsp; <i class="fas fa-question"></i> Incognite: TH, GS</div>
                                    <div class="input-group">
                                        <div class="input-field"><label>TC (°)</label><input type="number" id="p1_tc" step="any" placeholder="Rotta vera"></div>
                                        <div class="input-field"><label>TAS (kt)</label><input type="number" id="p1_tas" step="any" placeholder="Velocità propria"></div>
                                        <div class="input-field"><label>W (°)</label><input type="number" id="p1_w" step="any" placeholder="Dir. vento"></div>
                                        <div class="input-field"><label>V (kt)</label><input type="number" id="p1_v" step="any" placeholder="Vel. vento"></div>
                                    </div>
                                    <button class="calcola-problema" id="btnPrimo">CALCOLA TH & GS</button>
                                    <div id="risultatiPrimo" class="results-area"></div>
                                </div>
                                <!-- SECONDO PROBLEMA -->
                                <div class="problem-card">
                                    <div class="problem-title"><i class="fas fa-2"></i> Secondo Problema</div>
                                    <div class="problem-info"><i class="fas fa-database"></i> Dati: TH, TAS, W/V &nbsp;|&nbsp; <i class="fas fa-question"></i> Incognite: TC, GS</div>
                                    <div class="input-group">
                                        <div class="input-field"><label>TH (°)</label><input type="number" id="p2_th" step="any" placeholder="Rotta vera"></div>
                                        <div class="input-field"><label>TAS (kt)</label><input type="number" id="p2_tas" step="any" placeholder="Velocità propria"></div>
                                        <div class="input-field"><label>W (°)</label><input type="number" id="p2_w" step="any" placeholder="Dir. vento"></div>
                                        <div class="input-field"><label>V (kt)</label><input type="number" id="p2_v" step="any" placeholder="Vel. vento"></div>
                                    </div>
                                    <button class="calcola-problema" id="btnSecondo">CALCOLA TC & GS</button>
                                    <div id="risultatiSecondo" class="results-area"></div>
                                </div>
                                <!-- TERZO PROBLEMA -->
                                <div class="problem-card">
                                    <div class="problem-title"><i class="fas fa-3"></i> Terzo Problema</div>
                                    <div class="problem-info"><i class="fas fa-database"></i> Dati: TH, TC, GS, TAS &nbsp;|&nbsp; <i class="fas fa-question"></i> Incognite: W/V</div>
                                    <div class="input-group">
                                        <div class="input-field"><label>TH (°)</label><input type="number" id="p3_th" step="any" placeholder="Rotta vera"></div>
                                        <div class="input-field"><label>TC (°)</label><input type="number" id="p3_tc" step="any" placeholder="Traccia"></div>
                                        <div class="input-field"><label>GS (kt)</label><input type="number" id="p3_gs" step="any" placeholder="Vel. al suolo"></div>
                                        <div class="input-field"><label>TAS (kt)</label><input type="number" id="p3_tas" step="any" placeholder="Velocità propria"></div>
                                    </div>
                                    <button class="calcola-problema" id="btnTerzo">CALCOLA VENTO (W/V)</button>
                                    <div id="risultatiTerzo" class="results-area"></div>
                                </div>
                                <!-- QUARTO PROBLEMA -->
                                <div class="problem-card">
                                    <div class="problem-title"><i class="fas fa-4"></i> Quarto Problema</div>
                                    <div class="problem-info"><i class="fas fa-database"></i> Dati: TC, GS, W/V &nbsp;|&nbsp; <i class="fas fa-question"></i> Incognite: TH, TAS</div>
                                    <div class="input-group">
                                        <div class="input-field"><label>TC (°)</label><input type="number" id="p4_tc" step="any" placeholder="Traccia"></div>
                                        <div class="input-field"><label>GS (kt)</label><input type="number" id="p4_gs" step="any" placeholder="Vel. al suolo"></div>
                                        <div class="input-field"><label>W (°)</label><input type="number" id="p4_w" step="any" placeholder="Dir. vento"></div>
                                        <div class="input-field"><label>V (kt)</label><input type="number" id="p4_v" step="any" placeholder="Vel. vento"></div>
                                    </div>
                                    <button class="calcola-problema" id="btnQuarto">CALCOLA TH & TAS</button>
                                    <div id="risultatiQuarto" class="results-area"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            // altri moduli (placeholder)
            return `<div class="reveal active"><div class="module-card"><div class="module-title"><i class="fas fa-tools"></i> ${moduleId.toUpperCase()}</div><div class="divider"></div><p>Modulo in fase di sviluppo.</p></div></div>`;
        }

        // ========== FUNZIONI DI CALCOLO DETTAGLIATE ==========
        function calcolaPrimo() {
            const tc = parseFloat(document.getElementById('p1_tc').value);
            const tas = parseFloat(document.getElementById('p1_tas').value);
            const w = parseFloat(document.getElementById('p1_w').value);
            const v = parseFloat(document.getElementById('p1_v').value);
            const outDiv = document.getElementById('risultatiPrimo');
            if (isNaN(tc) || isNaN(tas) || isNaN(w) || isNaN(v)) {
                outDiv.innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori numerici.</div>`;
                return;
            }
            const diff_deg = w - tc;
            const diff_rad = diff_deg * Math.PI / 180;
            const xc = v * Math.sin(diff_rad);
            const lc = -v * Math.cos(diff_rad);
            const rapporto = xc / tas;
            if (Math.abs(rapporto) > 1) {
                outDiv.innerHTML = `<div class="error-message">⚠️ VENTO TROPPO FORTE! Il rapporto xc/TAS supera 1.</div>`;
                return;
            }
            const wca_rad = Math.asin(rapporto);
            const wca = wca_rad * 180 / Math.PI;
            const etas = tas * Math.cos(wca_rad);
            let th = tc + wca;
            th = ((th % 360) + 360) % 360;
            const gs = etas + lc;
            const round = (n) => n.toFixed(3);
            outDiv.innerHTML = `
                <div><span class="result-name">XC</span> = ${v}·sin(${diff_deg}°) = ${round(xc)}</div>
                <div><span class="result-name">LC</span> = -${v}·cos(${diff_deg}°) = ${round(lc)}</div>
                <div><span class="result-name">WCA</span> = arcsin(${round(xc)}/${tas}) = ${round(wca)}°</div>
                <div><span class="result-name">ETAS</span> = ${tas}·cos(${round(wca)}°) = ${round(etas)}</div>
                <div><span class="result-name">TH</span> = TC + WCA = ${round(th)}°</div>
                <div><span class="result-name">GS</span> = ETAS + LC = ${round(gs)} kt</div>
            `;
        }

        function calcolaSecondo() {
            const th = parseFloat(document.getElementById('p2_th').value);
            const tas = parseFloat(document.getElementById('p2_tas').value);
            const w = parseFloat(document.getElementById('p2_w').value);
            const v = parseFloat(document.getElementById('p2_v').value);
            const outDiv = document.getElementById('risultatiSecondo');
            if (isNaN(th) || isNaN(tas) || isNaN(w) || isNaN(v)) {
                outDiv.innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori numerici.</div>`;
                return;
            }
            let tcp_prev = th;
            let iterations = [];
            let converged = false;
            let finalTcp = tcp_prev;
            let finalWca = 0;
            for (let i = 1; i <= 6; i++) {
                const alfa_deg = w - tcp_prev;
                const alfa_rad = alfa_deg * Math.PI / 180;
                const xc = v * Math.sin(alfa_rad);
                let ratio = xc / tas;
                if (ratio > 1) ratio = 1; if (ratio < -1) ratio = -1;
                const wca_rad = Math.asin(ratio);
                const wca = wca_rad * 180 / Math.PI;
                const tcp_curr = th - wca;
                const diff = Math.abs(tcp_curr - tcp_prev);
                iterations.push({i, xc, wca, tcp_curr});
                finalTcp = tcp_curr;
                finalWca = wca;
                if (diff < 0.001) { converged = true; break; }
                tcp_prev = tcp_curr;
            }
            const ang_lc_rad = (w - finalTcp) * Math.PI / 180;
            const lc = -v * Math.cos(ang_lc_rad);
            const etas = tas * Math.cos(finalWca * Math.PI/180);
            const gs = etas + lc;
            let html = `<div><strong>Iterazioni:</strong></div>`;
            iterations.forEach(it => {
                html += `<div class="iteration-card">Iter. ${it.i}: XC=${it.xc.toFixed(3)}, WCA=${it.wca.toFixed(3)}°, TCp=${it.tcp_curr.toFixed(3)}°</div>`;
            });
            if(converged) html += `<div class="result-name" style="color:cyan;">✓ Convergenza raggiunta</div>`;
            html += `<div><span class="result-name">TC (traccia)</span> = ${finalTcp.toFixed(3)}°</div>`;
            html += `<div><span class="result-name">LC</span> = -${v}·cos(${(w-finalTcp).toFixed(2)}°) = ${lc.toFixed(3)}</div>`;
            html += `<div><span class="result-name">ETAS</span> = ${tas}·cos(${finalWca.toFixed(3)}°) = ${etas.toFixed(3)}</div>`;
            html += `<div><span class="result-name">GS</span> = ${etas.toFixed(3)} + ${lc.toFixed(3)} = ${gs.toFixed(3)} kt</div>`;
            outDiv.innerHTML = html;
        }

        function calcolaTerzo() {
            const th = parseFloat(document.getElementById('p3_th').value);
            const tc = parseFloat(document.getElementById('p3_tc').value);
            const gs = parseFloat(document.getElementById('p3_gs').value);
            const tas = parseFloat(document.getElementById('p3_tas').value);
            const outDiv = document.getElementById('risultatiTerzo');
            if (isNaN(th) || isNaN(tc) || isNaN(gs) || isNaN(tas)) {
                outDiv.innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori.</div>`;
                return;
            }
            const wca = th - tc;
            const wca_rad = wca * Math.PI / 180;
            const xc = tas * Math.sin(wca_rad);
            const etas = tas * Math.cos(wca_rad);
            const lc = gs - etas;
            const v_vento = Math.sqrt(xc*xc + lc*lc);
            let w_dir;
            if (Math.abs(v_vento) < 1e-6) w_dir = 0;
            else {
                const segno = xc > 0 ? -1 : 1;
                const asin_val = Math.asin(lc / v_vento) * 180 / Math.PI;
                const angolo_interno = 90 - asin_val;
                let w_parziale = tc + (segno * angolo_interno);
                if (w_parziale < 180) w_dir = w_parziale + 180;
                else w_dir = w_parziale - 180;
                w_dir = ((w_dir % 360) + 360) % 360;
            }
            outDiv.innerHTML = `
                <div><span class="result-name">WCA</span> = ${th} - ${tc} = ${wca.toFixed(3)}°</div>
                <div><span class="result-name">XC</span> = ${tas}·sin(${wca.toFixed(3)}°) = ${xc.toFixed(3)}</div>
                <div><span class="result-name">ETAS</span> = ${tas}·cos(${wca.toFixed(3)}°) = ${etas.toFixed(3)}</div>
                <div><span class="result-name">LC</span> = GS - ETAS = ${gs} - ${etas.toFixed(3)} = ${lc.toFixed(3)}</div>
                <div><span class="result-name">Vento V</span> = √(${xc.toFixed(3)}²+${lc.toFixed(3)}²) = ${v_vento.toFixed(3)} kt</div>
                <div><span class="result-name">Direzione vento W</span> = ${w_dir.toFixed(3)}°</div>
            `;
        }

        function calcolaQuarto() {
            const tc = parseFloat(document.getElementById('p4_tc').value);
            const gs = parseFloat(document.getElementById('p4_gs').value);
            const w = parseFloat(document.getElementById('p4_w').value);
            const v = parseFloat(document.getElementById('p4_v').value);
            const outDiv = document.getElementById('risultatiQuarto');
            if (isNaN(tc) || isNaN(gs) || isNaN(w) || isNaN(v)) {
                outDiv.innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori.</div>`;
                return;
            }
            const diff_deg = w - tc;
            const diff_rad = diff_deg * Math.PI / 180;
            const xc = v * Math.sin(diff_rad);
            const lc = -v * Math.cos(diff_rad);
            const etas = gs - lc;
            if (Math.abs(etas) < 1e-6) {
                outDiv.innerHTML = `<div class="error-message">Errore: ETAS prossimo a zero.</div>`;
                return;
            }
            const wca_rad = Math.atan(xc / etas);
            const wca = wca_rad * 180 / Math.PI;
            let th = tc + wca;
            th = ((th % 360) + 360) % 360;
            const tas = etas / Math.cos(wca_rad);
            outDiv.innerHTML = `
                <div><span class="result-name">XC</span> = ${v}·sin(${diff_deg}°) = ${xc.toFixed(3)}</div>
                <div><span class="result-name">LC</span> = -${v}·cos(${diff_deg}°) = ${lc.toFixed(3)}</div>
                <div><span class="result-name">ETAS</span> = GS - LC = ${gs} - ${lc.toFixed(3)} = ${etas.toFixed(3)}</div>
                <div><span class="result-name">WCA</span> = arctan(${xc.toFixed(3)}/${etas.toFixed(3)}) = ${wca.toFixed(3)}°</div>
                <div><span class="result-name">TH</span> = TC + WCA = ${th.toFixed(3)}°</div>
                <div><span class="result-name">TAS</span> = ETAS / cos(WCA) = ${tas.toFixed(3)} kt</div>
            `;
        }

        // Attach listeners per i bottoni dei problemi del vento
        function attachVentoCalculators() {
            const btn1 = document.getElementById('btnPrimo');
            const btn2 = document.getElementById('btnSecondo');
            const btn3 = document.getElementById('btnTerzo');
            const btn4 = document.getElementById('btnQuarto');
            if(btn1) btn1.addEventListener('click', calcolaPrimo);
            if(btn2) btn2.addEventListener('click', calcolaSecondo);
            if(btn3) btn3.addEventListener('click', calcolaTerzo);
            if(btn4) btn4.addEventListener('click', calcolaQuarto);
        }

        // Navigazione principale
        function navigateTo(moduleId, addToHistory = true) {
            currentModule = moduleId;
            const container = document.getElementById('main-container');
            if (!container) return;
            container.innerHTML = getModuleHTML(moduleId);
            
            if (moduleId === 'vento') {
                attachVentoCalculators();
                closeMainMenu();
                mobileMenuVento.style.display = 'block';
                mobileMenu.style.display = 'none';
            } else {
                closeVentoMenu();
                mobileMenuVento.style.display = 'none';
                mobileMenu.style.display = 'block';
            }
            const reveals = container.querySelectorAll('.reveal');
            reveals.forEach(el => el.classList.add('active'));
            const titles = {
                home: 'NavTech | Navigazione',
                vento: 'Problema del Vento - NavTech',
                lossodromia: 'Lossodromia - NavTech',
                ortodromia: 'Ortodromia - NavTech',
                pnr: 'PNR - NavTech',
                per: 'PET - NavTech',
                intercettamento: 'Intercettamento - NavTech'
            };
            document.title = titles[moduleId] || 'NavTech Pro';
            if (addToHistory) {
                const state = { module: moduleId };
                const url = new URL(window.location);
                url.searchParams.set('nav', moduleId);
                window.history.pushState(state, '', url);
            }
        }
        
        // Eventi menu principale
        document.querySelectorAll('.mobile-nav-links a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const pageKey = link.getAttribute('data-page');
                if (pageKey) {
                    navigateTo(pageKey, true);
                    closeMainMenu();
                }
            });
        });
        
        const logoHome = document.getElementById('logo-home');
        if (logoHome) logoHome.addEventListener('click', () => navigateTo('home', true));
        
        window.addEventListener('popstate', (event) => {
            let moduleId = event.state?.module || new URLSearchParams(window.location.search).get('nav') || 'home';
            if(!['vento','lossodromia','ortodromia','pnr','per','intercettamento'].includes(moduleId)) moduleId = 'home';
            navigateTo(moduleId, false);
        });
        
        // Particelle e animazioni
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.5 + 0.2
                });
            }
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 229, 255, ${p.alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', () => { initParticles(); });
        initParticles();
        drawParticles();
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => entry.isIntersecting && entry.target.classList.add('active'));
        }, { threshold: 0.15 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        
        // Avvio
        mobileMenuVento.style.display = 'none';
        mobileMenu.style.display = 'block';
        const initialParam = new URLSearchParams(window.location.search).get('nav');
        if (initialParam && ['vento','lossodromia','ortodromia','pnr','per','intercettamento'].includes(initialParam)) {
            navigateTo(initialParam, false);
            window.history.replaceState({ module: initialParam }, '', window.location.href);
        } else {
            navigateTo('home', false);
            window.history.replaceState({ module: 'home' }, '', window.location.pathname);
        }
    </script>
