<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NavTech Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 229, 255, 0.2);
            --card-bg: rgba(10, 20, 30, 0.7);
            --transition-smooth: all 0.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* SFONDO DINAMICO */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            transition: var(--transition-smooth);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-text:hover { 
            text-shadow: 0 0 15px var(--accent-cyan); 
            transform: scale(1.02);
        }
        .logo-text span { color: var(--accent-cyan); }
        .logo-text i { color: var(--accent-cyan); }

        /* HAMBURGER ANIMATO */
        .hamburger {
            cursor: pointer;
            z-index: 1100;
            background: none;
            border: none;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bar {
            display: block;
            width: 30px;
            height: 3px;
            background-color: var(--accent-cyan);
            transition: var(--transition-smooth);
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
        }

        /* Animazione Hamburger -> X */
        .hamburger.active .bar:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }
        .hamburger.active .bar:nth-child(2) {
            opacity: 0;
            transform: translateX(-20px);
        }
        .hamburger.active .bar:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        /* MENU LATERALE */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            height: 100vh;
            background: rgba(2, 5, 10, 0.98);
            backdrop-filter: blur(35px);
            border-left: 2px solid var(--accent-cyan);
            z-index: 1050;
            transition: var(--transition-smooth);
            padding: 120px 40px;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .mobile-menu.active { 
            right: 0; 
        }

        .menu-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: fadeIn 0.8s ease forwards;
        }

        .mobile-nav-links {
            list-style: none;
        }

        .mobile-nav-links li {
            margin-bottom: 5px;
            opacity: 0;
            transform: translateX(40px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mobile-menu.active .mobile-nav-links li {
            opacity: 1;
            transform: translateX(0);
        }

        /* Ritardi sequenziali per le voci del menu */
        .mobile-nav-links li:nth-child(1) { transition-delay: 0.1s; }
        .mobile-nav-links li:nth-child(2) { transition-delay: 0.2s; }
        .mobile-nav-links li:nth-child(3) { transition-delay: 0.3s; }
        .mobile-nav-links li:nth-child(4) { transition-delay: 0.4s; }
        .mobile-nav-links li:nth-child(5) { transition-delay: 0.5s; }
        .mobile-nav-links li:nth-child(6) { transition-delay: 0.6s; }

        .mobile-nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 18px 0;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s ease;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            letter-spacing: 1px;
        }

        .mobile-nav-links a:hover {
            color: var(--accent-cyan);
            padding-left: 15px;
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        .mobile-nav-links a i {
            width: 25px;
            text-align: center;
            color: var(--accent-cyan);
            font-size: 1.2rem;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1040;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s ease;
        }
        .menu-overlay.active { opacity: 1; visibility: visible; }

        /* CONTENUTO PRINCIPALE */
        .main-container {
            flex: 1;
            padding: 100px 8%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .module-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid var(--border);
            padding: 100px 50px;
            width: 100%;
            max-width: 1000px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.15);
            animation: cardAppear 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .module-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            color: var(--accent-cyan);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        .title-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            width: 40%;
            margin: 0 auto;
            animation: dividerExpand 1s ease-out;
        }

        /* KEYFRAMES ANIMAZIONI */
        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes dividerExpand {
            from { width: 0; opacity: 0; }
            to { width: 40%; opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* FOOTER */
        .footer {
            padding: 40px;
            text-align: center;
            border-top: 1px solid var(--border);
            background: rgba(2, 5, 10, 0.9);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.6);
        }

        .footer strong { 
            color: var(--accent-cyan); 
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .mobile-menu { width: 100%; }
            .module-title { font-size: 1.8rem; letter-spacing: 4px; }
            .module-card { padding: 60px 20px; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>

    <nav>
        <div class="logo-text" id="logo-home">
            <i class="fas fa-compass-drafting"></i> NAV<span>TECH</span>
        </div>
        <button class="hamburger" id="hamburger-btn">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </nav>

    <div class="menu-overlay" id="overlay"></div>

    <div class="mobile-menu" id="side-menu">
        <div class="menu-header" id="menu-label">NAVIGAZIONE</div>
        <ul class="mobile-nav-links" id="menu-list">
            </ul>
    </div>

    <main class="main-container" id="content-area">
        </main>

    <footer class="footer">
        SVILUPPATO DA <strong>ALESSIO LUCCHINI</strong> <i class="fas fa-plus" style="font-size: 0.7rem; margin: 0 5px;"></i> <strong>ANDREA SQUIZZATO</strong>
    </footer>

    <script>
        const contentArea = document.getElementById('content-area');
        const menuList = document.getElementById('menu-list');
        const menuLabel = document.getElementById('menu-label');
        const sideMenu = document.getElementById('side-menu');
        const overlay = document.getElementById('overlay');
        const hamburgerBtn = document.getElementById('hamburger-btn');

        // DATABASE CONFIGURAZIONE
        const mainMenu = [
            { id: 'vento', text: 'Problema del Vento', icon: 'fa-wind' },
            { id: 'lossodromia', text: 'Lossodromia', icon: 'fa-route' },
            { id: 'ortodromia', text: 'Ortodromia', icon: 'fa-earth-americas' },
            { id: 'intercettamento', text: 'Intercettamento', icon: 'fa-crosshairs' },
            { id: 'pnr', text: 'PNR', icon: 'fa-map-location-dot' },
            { id: 'pet', text: 'PET', icon: 'fa-clock-rotate-left' }
        ];

        const windSubMenu = [
            { id: 'v1', text: '1° Problema Vento', icon: 'fa-chevron-right' },
            { id: 'v2', text: '2° Problema Vento', icon: 'fa-chevron-right' },
            { id: 'v3', text: '3° Problema Vento', icon: 'fa-chevron-right' },
            { id: 'v4', text: '4° Problema Vento', icon: 'fa-chevron-right' }
        ];

        // GESTIONE MENU DINAMICO
        function renderMenu(items, label) {
            menuLabel.innerText = label;
            menuList.innerHTML = '';
            
            items.forEach((item, index) => {
                const li = document.createElement('li');
                // Il ritardo dell'animazione viene gestito dal CSS tramite i selettori nth-child
                li.innerHTML = `<a href="#" data-id="${item.id}"><i class="fas ${item.icon}"></i> ${item.text}</a>`;
                
                li.querySelector('a').onclick = (e) => {
                    e.preventDefault();
                    handleNavigation(item.id, item.text);
                };
                menuList.appendChild(li);
            });
        }

        function handleNavigation(id, title) {
            toggleMenu(false); // Chiudi menu dopo click

            // Se entriamo nel Problema del Vento, cambiamo il menu futuro
            if (id === 'vento') {
                setTimeout(() => {
                    renderMenu(windSubMenu, 'PROBLEMI VENTO');
                    showScreen(title);
                }, 400);
            } 
            // Se siamo già dentro un problema del vento o altre sezioni
            else {
                showScreen(title);
            }
        }

        function showScreen(title) {
            // Effetto transizione contenuto
            contentArea.style.opacity = '0';
            setTimeout(() => {
                contentArea.innerHTML = `
                    <div class="module-card">
                        <h1 class="module-title">${title}</h1>
                        <div class="title-divider"></div>
                    </div>
                `;
                contentArea.style.opacity = '1';
                document.title = "NavTech | " + title;
            }, 300);
        }

        function goHome() {
            contentArea.innerHTML = ''; // Svuota per la Home pulita
            renderMenu(mainMenu, 'NAVIGAZIONE');
            document.title = "NavTech Professional";
            toggleMenu(false);
        }

        // CONTROLLI UI
        function toggleMenu(forceClose = null) {
            const shouldOpen = forceClose !== null ? !forceClose : !sideMenu.classList.contains('active');
            
            if (shouldOpen) {
                sideMenu.classList.add('active');
                overlay.classList.add('active');
                hamburgerBtn.classList.add('active');
            } else {
                sideMenu.classList.remove('active');
                overlay.classList.remove('active');
                hamburgerBtn.classList.remove('active');
            }
        }

        hamburgerBtn.onclick = () => toggleMenu();
        overlay.onclick = () => toggleMenu(false);
        document.getElementById('logo-home').onclick = goHome;

        // SISTEMA PARTICELLE (BACKGROUND ANIMATO)
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speedX: (Math.random() - 0.5) * 0.4,
                    speedY: (Math.random() - 0.5) * 0.4,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
        }

        function animateParticles() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                
                if(p.x > canvas.width) p.x = 0;
                if(p.x < 0) p.x = canvas.width;
                if(p.y > canvas.height) p.y = 0;
                if(p.y < 0) p.y = canvas.height;
                
                ctx.fillStyle = `rgba(0, 229, 255, ${p.opacity})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        window.onresize = initParticles;
        
        // AVVIO
        initParticles();
        animateParticles();
        goHome(); // Inizializza con Home pulita e Menu Main

    </script>
</body>
</html>
