<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NavTech | Lossodromia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(10, 20, 30, 0.6);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.35;
            z-index: -1;
            pointer-events: none;
        }
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
        }
        .logo-text span { color: var(--accent-cyan); }
        .logo-text i { margin-right: 8px; color: var(--accent-cyan); }
        .hamburger {
            display: block;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 10px;
        }
        .bar {
            display: block;
            width: 30px;
            height: 3px;
            margin: 6px auto;
            background-color: var(--accent-cyan);
            transition: all 0.3s ease;
            border-radius: 2px;
        }
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 380px;
            height: 100vh;
            background: rgba(2, 5, 10, 0.98);
            backdrop-filter: blur(25px);
            border-left: 2px solid var(--accent-cyan);
            z-index: 1050;
            transition: 0.5s;
            padding-top: 100px;
        }
        .mobile-menu.active { right: 0; }
        .menu-header {
            position: absolute;
            top: 25px;
            left: 30px;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--accent-cyan);
            padding-bottom: 8px;
            font-size: 1.1rem;
        }
        .menu-header i { margin-right: 8px; }
        .mobile-nav-links {
            list-style: none;
            padding: 0 30px;
        }
        .mobile-nav-links li {
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.4s ease;
        }
        .mobile-menu.active .mobile-nav-links li {
            opacity: 1;
            transform: translateX(0);
        }
        .mobile-nav-links li:nth-child(1) { transition-delay: 0.1s; }
        .mobile-nav-links li:nth-child(2) { transition-delay: 0.2s; }
        .mobile-nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
        }
        .mobile-nav-links a i {
            width: 35px;
            font-size: 1.4rem;
            color: var(--accent-cyan);
        }
        .mobile-nav-links a:hover {
            color: var(--accent-cyan);
            padding-left: 20px;
        }
        .close-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--accent-cyan);
            font-size: 1.8rem;
            cursor: pointer;
        }
        .main-container {
            flex: 1;
            padding: 140px 8% 100px;
        }
        .module-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 2rem;
        }
        .module-title {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            width: 100px;
            margin: 1rem 0 1.5rem 0;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .input-field {
            flex: 1;
            min-width: 150px;
        }
        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-family: 'Orbitron', monospace;
            color: var(--accent-cyan);
            font-size: 0.9rem;
        }
        .input-field input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
        }
        button.calcola {
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            cursor: pointer;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .result-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(0,229,255,0.2);
        }
        .result-name {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            border-left: 3px solid var(--accent-cyan);
            padding-left: 12px;
            margin-bottom: 12px;
        }
        .detail-formula {
            font-family: monospace;
            background: rgba(0,229,255,0.1);
            padding: 8px;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 0.85rem;
        }
        .detail-value {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: right;
            border-top: 1px dashed rgba(0,229,255,0.3);
            padding-top: 10px;
            margin-top: 10px;
        }
        .error-message {
            background: rgba(255,0,0,0.2);
            border-left: 4px solid #ff4444;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .footer-credits {
            text-align: center;
            padding: 20px;
            border-top: 1px solid var(--border);
            background: rgba(2, 5, 10, 0.85);
        }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1040;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        @media (max-width: 768px) {
            .mobile-menu { width: 100%; }
            .main-container { padding: 120px 5% 80px; }
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>
    <nav>
        <div class="logo-text" id="logo-home"><i class="fas fa-compass-drafting"></i> NAV<span>TECH</span></div>
        <div class="hamburger" id="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
    </nav>
    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="mobile-menu" id="mobile-menu">
        <div class="menu-header"><i class="fas fa-route"></i> LOSSODROMIA</div>
        <button class="close-menu" id="close-menu"><i class="fas fa-times"></i></button>
        <ul class="mobile-nav-links">
            <li><a href="#" data-problem="1"><i class="fas fa-1"></i> Primo Problema</a></li>
            <li><a href="#" data-problem="2"><i class="fas fa-2"></i> Secondo Problema</a></li>
        </ul>
    </div>
    <main class="main-container" id="main-container"></main>
    <footer class="footer-credits">
        <p>Sistema di Navigazione Avanzata</p>
        <div class="developers"><strong>Alessio Lucchini</strong> + <strong>Andrea Squizzato</strong></div>
    </footer>
    <script>
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const closeMenuBtn = document.getElementById('close-menu');

        function setHamburgerOpen() {
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(-45deg) translate(-6px, 7px)';
            bars[1].style.opacity = '0';
            bars[2].style.transform = 'rotate(45deg) translate(-6px, -7px)';
        }
        function setHamburgerClosed() {
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'rotate(0) translate(0, 0)';
            bars[1].style.opacity = '1';
            bars[2].style.transform = 'rotate(0) translate(0, 0)';
        }
        function openMenu() {
            mobileMenu.classList.add('active');
            menuOverlay.classList.add('active');
            setHamburgerOpen();
        }
        function closeMenu() {
            mobileMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
            setHamburgerClosed();
        }
        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (mobileMenu.classList.contains('active')) closeMenu();
            else openMenu();
        });
        closeMenuBtn.addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu);

        function showProblem1() {
            const container = document.getElementById('main-container');
            container.innerHTML = `
                <div class="module-card">
                    <div class="module-title"><i class="fas fa-1"></i> Primo Problema della Lossodromia</div>
                    <div class="divider"></div>
                    <div class="calculator-form">
                        <div class="input-group">
                            <div class="input-field"><label>φa (Latitudine partenza) <i class="fas fa-map-pin"></i></label><input type="number" id="fa" step="any" placeholder="Inserisci φa in gradi decimali"></div>
                            <div class="input-field"><label>λa (Longitudine partenza) <i class="fas fa-map-pin"></i></label><input type="number" id="la" step="any" placeholder="Inserisci λa in gradi decimali"></div>
                            <div class="input-field"><label>TC (Rotta vera) <i class="fas fa-arrow-right"></i></label><input type="number" id="tc" step="any" placeholder="Inserisci TC in gradi"></div>
                            <div class="input-field"><label>D (Distanza) <i class="fas fa-ruler"></i></label><input type="number" id="d" step="any" placeholder="Inserisci D in NM"></div>
                        </div>
                        <button class="calcola" id="calcola">CALCOLA</button>
                        <div id="risultati"></div>
                    </div>
                </div>
            `;
            document.getElementById('calcola').addEventListener('click', () => {
                const fa = parseFloat(document.getElementById('fa').value);
                const la = parseFloat(document.getElementById('la').value);
                const tc = parseFloat(document.getElementById('tc').value);
                const d = parseFloat(document.getElementById('d').value);
                if ([fa, la, tc, d].some(isNaN)) {
                    document.getElementById('risultati').innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori.</div>`;
                    return;
                }
                const toRad = deg => deg * Math.PI / 180;
                const round3 = n => n.toFixed(3);
                const delta_phi = d * Math.cos(toRad(tc));
                const phi_b_min = fa * 60 + delta_phi;
                const phi_b = phi_b_min / 60;
                const phi_m = (fa + phi_b) / 2;
                let delta_lambda, lambda_b;
                if (Math.abs(Math.cos(toRad(phi_m))) < 1e-9) {
                    document.getElementById('risultati').innerHTML = `<div class="error-message">⚠️ Errore: rotta polare.</div>`;
                    return;
                }
                delta_lambda = (d * Math.sin(toRad(tc))) / Math.cos(toRad(phi_m));
                lambda_b = la + delta_lambda / 60;
                document.getElementById('risultati').innerHTML = `<div class="results-grid">
                    <div class="result-card"><div class="result-name">Δφ</div><div class="detail-formula">Δφ = D · cos(TC)</div><div class="detail-value">${round3(delta_phi)} ' (minuti)</div></div>
                    <div class="result-card"><div class="result-name">φb</div><div class="detail-formula">φb = φa + Δφ/60</div><div class="detail-value">${round3(phi_b)}°</div></div>
                    <div class="result-card"><div class="result-name">φm</div><div class="detail-formula">φm = (φa + φb)/2</div><div class="detail-value">${round3(phi_m)}°</div></div>
                    <div class="result-card"><div class="result-name">Δλ</div><div class="detail-formula">Δλ = (D·sin(TC))/cos(φm)</div><div class="detail-value">${round3(delta_lambda)} ' (minuti)</div></div>
                    <div class="result-card"><div class="result-name">λb</div><div class="detail-formula">λb = λa + Δλ/60</div><div class="detail-value">${round3(lambda_b)}°</div></div>
                </div>`;
            });
        }

        function showProblem2() {
            const container = document.getElementById('main-container');
            container.innerHTML = `
                <div class="module-card">
                    <div class="module-title"><i class="fas fa-2"></i> Secondo Problema della Lossodromia</div>
                    <div class="divider"></div>
                    <div class="calculator-form">
                        <div class="input-group">
                            <div class="input-field"><label>φa (Latitudine partenza)</label><input type="number" id="fa" step="any"></div>
                            <div class="input-field"><label>λa (Longitudine partenza)</label><input type="number" id="la" step="any"></div>
                            <div class="input-field"><label>φb (Latitudine arrivo)</label><input type="number" id="fb" step="any"></div>
                            <div class="input-field"><label>λb (Longitudine arrivo)</label><input type="number" id="lb" step="any"></div>
                        </div>
                        <button class="calcola" id="calcola">CALCOLA</button>
                        <div id="risultati"></div>
                    </div>
                </div>
            `;
            document.getElementById('calcola').addEventListener('click', () => {
                const fa = parseFloat(document.getElementById('fa').value);
                const la = parseFloat(document.getElementById('la').value);
                const fb = parseFloat(document.getElementById('fb').value);
                const lb = parseFloat(document.getElementById('lb').value);
                if ([fa, la, fb, lb].some(isNaN)) {
                    document.getElementById('risultati').innerHTML = `<div class="error-message">⚠️ Inserisci tutti i valori.</div>`;
                    return;
                }
                const toRad = deg => deg * Math.PI / 180;
                const round3 = n => n.toFixed(3);
                const delta_phi = (fb - fa) * 60;
                const delta_lambda = (lb - la) * 60;
                const phi_m = (fa + fb) / 2;
                let tc_deg;
                if (Math.abs(delta_phi) < 1e-9) tc_deg = delta_lambda > 0 ? 90 : 270;
                else {
                    const tan_tc = (delta_lambda * Math.cos(toRad(phi_m))) / delta_phi;
                    tc_deg = Math.atan(tan_tc) * 180 / Math.PI;
                    if (delta_phi < 0) tc_deg += 180;
                    tc_deg = ((tc_deg % 360) + 360) % 360;
                }
                const d = Math.abs(delta_phi / Math.cos(toRad(tc_deg)));
                document.getElementById('risultati').innerHTML = `<div class="results-grid">
                    <div class="result-card"><div class="result-name">Δφ</div><div class="detail-value">${round3(delta_phi)} ' (minuti)</div></div>
                    <div class="result-card"><div class="result-name">Δλ</div><div class="detail-value">${round3(delta_lambda)} ' (minuti)</div></div>
                    <div class="result-card"><div class="result-name">φm</div><div class="detail-value">${round3(phi_m)}°</div></div>
                    <div class="result-card"><div class="result-name">TCq</div><div class="detail-value">${round3(tc_deg)}°</div></div>
                    <div class="result-card"><div class="result-name">D</div><div class="detail-value">${round3(d)} NM</div></div>
                </div>`;
            });
        }

        document.querySelectorAll('.mobile-nav-links a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const problem = link.getAttribute('data-problem');
                if (problem === '1') showProblem1();
                else if (problem === '2') showProblem2();
                closeMenu();
            });
        });

        document.getElementById('logo-home').addEventListener('click', () => window.location.href = 'Home.html');
        showProblem1();

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.6, vy: (Math.random() - 0.5) * 0.6, size: Math.random() * 2 + 0.5, alpha: Math.random() * 0.5 + 0.2 });
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.x += p.vx; p.y += p.vy; if (p.x < 0 || p.x > canvas.width) p.vx *= -1; if (p.y < 0 || p.y > canvas.height) p.vy *= -1; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(0, 229, 255, ${p.alpha})`; ctx.fill(); });
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', initParticles);
        initParticles();
        drawParticles();
    </script>
</body>
</html>
