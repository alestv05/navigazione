<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NavTech | PNR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #02050a;
            --accent-cyan: #00e5ff;
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(10, 20, 30, 0.6);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: url('https://i.postimg.cc/bvd85hNh/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.35;
            z-index: -1;
            pointer-events: none;
        }
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
        }
        .logo-text span { color: var(--accent-cyan); }
        .logo-text i { margin-right: 8px; color: var(--accent-cyan); }
        .main-container {
            flex: 1;
            padding: 140px 8% 100px;
        }
        .module-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 2rem;
        }
        .module-title {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            width: 100px;
            margin: 1rem 0 1.5rem 0;
        }
        .info-message {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.6);
            font-size: 1.2rem;
        }
        .info-message i {
            color: var(--accent-cyan);
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
        }
        .footer-credits {
            text-align: center;
            padding: 20px;
            border-top: 1px solid var(--border);
            background: rgba(2, 5, 10, 0.85);
        }
        @media (max-width: 768px) {
            .main-container { padding: 120px 5% 80px; }
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="bg-watermark"></div>
    <nav>
        <div class="logo-text" id="logo-home"><i class="fas fa-compass-drafting"></i> NAV<span>TECH</span></div>
    </nav>
    <main class="main-container">
        <div class="module-card">
            <div class="module-title"><i class="fas fa-map-location-dot"></i> PNR</div>
            <div class="divider"></div>
            <div class="info-message">
                <i class="fas fa-tools"></i>
                Punto di Non Ritorno - Modulo in fase di sviluppo<br>
                <span style="font-size: 0.9rem; margin-top: 15px; display: inline-block;">Prossimamente disponibile</span>
            </div>
        </div>
    </main>
    <footer class="footer-credits">
        <p>Sistema di Navigazione Avanzata</p>
        <div><strong>Alessio Lucchini</strong> + <strong>Andrea Squizzato</strong></div>
    </footer>
    <script>
        document.getElementById('logo-home').addEventListener('click', () => window.location.href = 'Home.html');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.6, vy: (Math.random() - 0.5) * 0.6, size: Math.random() * 2 + 0.5, alpha: Math.random() * 0.5 + 0.2 });
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.x += p.vx; p.y += p.vy; if (p.x < 0 || p.x > canvas.width) p.vx *= -1; if (p.y < 0 || p.y > canvas.height) p.vy *= -1; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(0, 229, 255, ${p.alpha})`; ctx.fill(); });
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', initParticles);
        initParticles();
        drawParticles();
    </script>
</body>
</html>
